<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Road Trip Planner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --food: #ea6c0a; --travel: #2563eb; --activity: #059669; --free: #7c3aed;
      --bg: #f8fafc; --surface: #ffffff; --surface2: #f1f5f9;
      --border: #e2e8f0; --text: #0f172a; --muted: #64748b; --accent: #0284c7;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Sidebar ── */
    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: 260px;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; z-index: 10;
    }
    #sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
    #sidebar-header h1 { font-size: 1.1rem; color: var(--accent); margin-bottom: 12px; }
    #btn-new-trip {
      width: 100%; background: var(--accent); color: #fff; border: none;
      padding: 8px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: .88rem;
    }
    #btn-new-trip:hover { opacity: .88; }
    #trips-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
    .trip-item {
      padding: 10px 12px; border-radius: 8px; cursor: pointer;
      border: 1px solid transparent; position: relative;
    }
    .trip-item:hover { background: var(--surface2); }
    .trip-item.active { background: rgba(56,189,248,.1); border-color: rgba(56,189,248,.35); }
    .trip-item-name { font-size: .88rem; font-weight: 600; }
    .trip-item-dates { font-size: .72rem; color: var(--muted); margin-top: 2px; }
    .trip-item-delete {
      position: absolute; top: 8px; right: 8px;
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: .8rem; opacity: 0; padding: 2px 5px; border-radius: 4px;
    }
    .trip-item:hover .trip-item-delete { opacity: 1; }
    .trip-item-delete:hover { color: #ef4444; background: rgba(239,68,68,.1); }
    .sidebar-empty { color: var(--muted); font-size: .82rem; text-align: center; padding: 20px 0; }

    /* ── Main ── */
    #main { margin-left: 260px; display: flex; flex-direction: column; min-height: 100vh; }

    /* ── Top bar ── */
    #topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .topbar-input {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 7px 11px; border-radius: 6px; font-size: .9rem;
    }
    #trip-name-input { width: 200px; font-size: 1rem; }
    input[type="date"].topbar-input { color-scheme: light; }
    .date-group { display: flex; align-items: center; gap: 6px; }
    .date-group label { color: var(--muted); font-size: .8rem; white-space: nowrap; }
    #btn-trip-links {
      margin-left: auto; background: transparent; border: 1px solid var(--accent);
      color: var(--accent); padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: .82rem;
    }
    #btn-trip-links:hover { background: rgba(56,189,248,.1); }

    /* ── Trip links panel ── */
    #trip-links-panel {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 20px; display: none; flex-direction: column; gap: 10px;
    }
    #trip-links-panel.open { display: flex; }
    #trip-links-panel h3 { font-size: .85rem; color: var(--muted); }
    .links-editor { display: flex; flex-direction: column; gap: 6px; }
    .link-row { display: flex; gap: 6px; }
    .link-row input {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 6px 9px; border-radius: 5px; font-size: .85rem; flex: 1;
    }
    .link-row input:first-child { max-width: 140px; }
    .btn-rm-link {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 5px; cursor: pointer; padding: 4px 8px; font-size: .8rem;
    }
    .btn-rm-link:hover { color: #ef4444; border-color: #ef4444; }
    .btn-add-link {
      background: none; border: 1px dashed var(--border); color: var(--muted);
      border-radius: 6px; padding: 6px; cursor: pointer; font-size: .8rem; text-align: center;
    }
    .btn-add-link:hover { border-color: var(--accent); color: var(--accent); }
    .links-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .links-chips a {
      color: var(--accent); font-size: .8rem; text-decoration: none;
      background: rgba(56,189,248,.08); padding: 2px 10px;
      border-radius: 4px; border: 1px solid rgba(56,189,248,.2);
    }
    .links-chips a:hover { text-decoration: underline; }

    /* ── Legend ── */
    #legend {
      display: flex; gap: 14px; padding: 8px 20px; flex-wrap: wrap;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .leg { display: flex; align-items: center; gap: 5px; font-size: .76rem; color: var(--muted); }
    .leg-dot { width: 9px; height: 9px; border-radius: 50%; }
    #legend .hint { margin-left: auto; font-size: .74rem; color: var(--muted); }

    /* ── Empty / no-trip states ── */
    .center-msg {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      color: var(--muted); padding: 40px;
    }
    .center-msg .icon { font-size: 3rem; }
    .center-msg p { font-size: .95rem; }
    .center-msg small { font-size: .8rem; }

    /* ── Calendar ── */
    #cal-wrapper { overflow-x: auto; padding: 20px; flex: 1; }
    #cal { display: flex; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; min-width: max-content; }

    .time-col {
      width: 54px; flex-shrink: 0; background: var(--surface);
      border-right: 1px solid var(--border); padding-top: 48px;
    }
    .time-tick {
      height: 60px; display: flex; align-items: flex-start;
      justify-content: flex-end; padding: 4px 7px 0 0;
      font-size: .68rem; color: var(--muted);
    }
    .day-col {
      flex: 1; min-width: 170px; border-right: 1px solid var(--border);
      background: var(--bg); position: relative;
    }
    .day-col:last-child { border-right: none; }
    .day-head {
      height: 48px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: .82rem; position: sticky; top: 0; z-index: 2;
    }
    .day-head .dn { font-size: 1.25rem; color: var(--accent); margin-right: 5px; }
    .hour-slot {
      height: 60px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background .1s;
    }
    .hour-slot:hover { background: rgba(56,189,248,.05); }
    .hour-slot:last-child { border-bottom: none; }
    .ev {
      position: absolute; left: 3px; right: 3px; border-radius: 5px;
      padding: 3px 6px; font-size: .7rem; font-weight: 600;
      cursor: pointer; overflow: hidden; z-index: 1; opacity: .93;
      transition: opacity .12s, transform .12s;
      display: flex; flex-direction: column; gap: 1px;
    }
    .ev:hover { opacity: 1; transform: scaleX(1.015); }
    .ev .et { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ev .eT { font-weight: 400; opacity: .8; font-size: .63rem; }
    .ev[data-type="Food"]     { background: var(--food);     color: #fff; }
    .ev[data-type="Travel"]   { background: var(--travel);   color: #fff; }
    .ev[data-type="Activity"] { background: var(--activity); color: #fff; }
    .ev[data-type="Free"]     { background: var(--free);     color: #fff; }

    /* ── Modal ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.55);
      display: flex; align-items: center; justify-content: center; z-index: 50; padding: 20px;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 26px; width: 100%; max-width: 460px;
      max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column; gap: 15px;
    }
    .modal h2 { font-size: 1.05rem; color: var(--accent); }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: .77rem; color: var(--muted); }
    .field input, .field textarea {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 8px 10px; border-radius: 6px; font-size: .88rem; width: 100%; color-scheme: light;
    }
    .field textarea { resize: vertical; min-height: 65px; font-family: inherit; }
    .two-col { display: flex; gap: 10px; }
    .two-col .field { flex: 1; }
    .pills { display: flex; gap: 7px; flex-wrap: wrap; }
    .pill {
      padding: 5px 13px; border-radius: 20px; border: 2px solid transparent;
      cursor: pointer; font-size: .8rem; font-weight: 600; opacity: .4; transition: opacity .14s;
    }
    .pill.on { opacity: 1; }
    .pill[data-t="Food"]     { background: var(--food);     color: #fff; border-color: var(--food); }
    .pill[data-t="Travel"]   { background: var(--travel);   color: #fff; border-color: var(--travel); }
    .pill[data-t="Activity"] { background: var(--activity); color: #fff; border-color: var(--activity); }
    .pill[data-t="Free"]     { background: var(--free);     color: #fff; border-color: var(--free); }
    .modal-links { display: flex; flex-direction: column; gap: 5px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
    .btn-primary {
      background: var(--accent); color: #fff; border: none;
      padding: 8px 20px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: .88rem;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-ghost {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: .88rem;
    }
    .btn-ghost:hover { border-color: var(--text); color: var(--text); }
    .btn-delete {
      background: none; border: 1px solid #ef4444; color: #ef4444;
      padding: 8px 13px; border-radius: 6px; cursor: pointer; font-size: .88rem; margin-right: auto;
    }
    .btn-delete:hover { background: rgba(239,68,68,.1); }
  </style>
</head>
<body>

<!-- Sidebar: trip list -->
<div id="sidebar">
  <div id="sidebar-header">
    <h1>🚗 Road Trip Planner</h1>
    <button id="btn-new-trip">+ New Trip</button>
  </div>
  <div id="trips-list"></div>
</div>

<!-- Main area -->
<div id="main">

  <!-- No trip selected state -->
  <div id="no-trip-state" class="center-msg" style="display:none">
    <div class="icon">🗺️</div>
    <p>Select a trip from the sidebar or create a new one</p>
  </div>

  <!-- Trip editor (shown when a trip is active) -->
  <div id="trip-editor" style="display:none">

    <!-- Top bar -->
    <div id="topbar">
      <input id="trip-name-input" class="topbar-input" type="text" placeholder="Trip name…">
      <div class="date-group">
        <label>Start</label>
        <input id="start-date" class="topbar-input" type="date">
      </div>
      <div class="date-group">
        <label>End</label>
        <input id="end-date" class="topbar-input" type="date">
      </div>
      <button id="btn-trip-links">🔗 Trip Links</button>
    </div>

    <!-- Trip links panel -->
    <div id="trip-links-panel">
      <h3>Trip Links & Resources</h3>
      <div class="links-editor" id="trip-links-editor"></div>
      <button class="btn-add-link" id="btn-add-trip-link">+ Add link</button>
      <div class="links-chips" id="trip-links-chips"></div>
    </div>

    <!-- Legend -->
    <div id="legend">
      <div class="leg"><div class="leg-dot" style="background:var(--food)"></div> Food</div>
      <div class="leg"><div class="leg-dot" style="background:var(--travel)"></div> Travel</div>
      <div class="leg"><div class="leg-dot" style="background:var(--activity)"></div> Activity</div>
      <div class="leg"><div class="leg-dot" style="background:var(--free)"></div> Free Time</div>
      <span class="hint">Click any time slot to add an event</span>
    </div>

    <!-- Calendar or empty-dates message -->
    <div id="no-dates-state" class="center-msg" style="display:none">
      <div class="icon">📅</div>
      <p>Enter start and end dates above to see your calendar</p>
    </div>
    <div id="cal-wrapper" style="display:none">
      <div id="cal"></div>
    </div>

  </div>
</div>

<!-- Event Modal -->
<div class="overlay" id="event-modal" style="display:none">
  <div class="modal">
    <h2 id="modal-heading">Add Event</h2>
    <div class="field">
      <label>Type</label>
      <div class="pills">
        <div class="pill on" data-t="Food">🍔 Food</div>
        <div class="pill" data-t="Travel">🚗 Travel</div>
        <div class="pill" data-t="Activity">🎯 Activity</div>
        <div class="pill" data-t="Free">😎 Free Time</div>
      </div>
    </div>
    <div class="field">
      <label>Title</label>
      <input type="text" id="ev-title" placeholder="e.g. Lunch at Joe's Diner">
    </div>
    <div class="two-col">
      <div class="field"><label>Start time</label><input type="time" id="ev-start"></div>
      <div class="field"><label>End time</label><input type="time" id="ev-end"></div>
    </div>
    <div class="field">
      <label>Location</label>
      <input type="text" id="ev-location" placeholder="e.g. 123 Main St, Nashville, TN">
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="ev-notes" placeholder="Details, reminders…"></textarea>
    </div>
    <div class="field">
      <label>Links</label>
      <div class="modal-links" id="ev-links-list"></div>
      <button class="btn-add-link" id="btn-add-ev-link" style="margin-top:5px">+ Add link</button>
    </div>
    <div class="modal-actions">
      <button class="btn-delete" id="btn-delete-ev" style="display:none">Delete</button>
      <button class="btn-ghost" id="btn-cancel-ev">Cancel</button>
      <button class="btn-primary" id="btn-save-ev">Save</button>
    </div>
  </div>
</div>

<script>
// ── Storage ────────────────────────────────────────────────────────────────────
const KEY = 'rtp-v1';

function dbLoad() {
  try { const r = localStorage.getItem(KEY); return r ? JSON.parse(r) : null; } catch { return null; }
}
function dbSave() { localStorage.setItem(KEY, JSON.stringify(db)); }

function makeTrip(id) {
  return { id, name: '', start: '', end: '', links: [], events: {} };
}

let db = dbLoad();
if (!db || typeof db.trips !== 'object') {
  const id = uid();
  db = { activeId: id, trips: { [id]: makeTrip(id) } };
  dbSave();
}
// Ensure activeId points to a real trip
if (!db.trips[db.activeId]) {
  db.activeId = Object.keys(db.trips)[0] || null;
}

function activeTrip() { return db.trips[db.activeId] || null; }

// ── Helpers ────────────────────────────────────────────────────────────────────
function uid() { return 't' + Date.now() + Math.random().toString(36).slice(2, 6); }
function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toMin(t) { const [h, m] = t.split(':').map(Number); return h * 60 + m; }

// Build YYYY-MM-DD from a local Date without UTC conversion
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function datesInRange(start, end) {
  const list = [];
  const cur = new Date(start + 'T00:00:00');
  const last = new Date(end + 'T00:00:00');
  while (cur <= last) {
    list.push(fmtDate(cur));
    cur.setDate(cur.getDate() + 1);
  }
  return list;
}

function fmtDateLabel(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function tripDateLabel(t) {
  if (!t.start && !t.end) return 'No dates set';
  if (t.start && t.end) return `${fmtDateLabel(t.start)} – ${fmtDateLabel(t.end)}`;
  if (t.start) return `From ${fmtDateLabel(t.start)}`;
  return `Until ${fmtDateLabel(t.end)}`;
}

// ── Sidebar ────────────────────────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('trips-list');
  const trips = Object.values(db.trips).sort((a, b) => b.id > a.id ? 1 : -1);
  list.innerHTML = '';

  if (!trips.length) {
    list.innerHTML = '<div class="sidebar-empty">No trips yet</div>';
    return;
  }

  trips.forEach(t => {
    const el = document.createElement('div');
    el.className = 'trip-item' + (t.id === db.activeId ? ' active' : '');
    el.innerHTML = `
      <div class="trip-item-name">${esc(t.name || 'Untitled Trip')}</div>
      <div class="trip-item-dates">${tripDateLabel(t)}</div>
      <button class="trip-item-delete" data-id="${t.id}" title="Delete">✕</button>
    `;
    el.addEventListener('click', e => {
      if (e.target.closest('.trip-item-delete')) return;
      db.activeId = t.id;
      dbSave();
      renderSidebar();
      renderTripEditor();
    });
    el.querySelector('.trip-item-delete').addEventListener('click', e => {
      e.stopPropagation();
      if (!confirm(`Delete "${t.name || 'Untitled Trip'}"? This can't be undone.`)) return;
      delete db.trips[t.id];
      if (db.activeId === t.id) {
        const remaining = Object.keys(db.trips);
        if (!remaining.length) {
          const newId = uid();
          db.trips[newId] = makeTrip(newId);
          db.activeId = newId;
        } else {
          db.activeId = remaining[0];
        }
      }
      dbSave();
      renderSidebar();
      renderTripEditor();
    });
    list.appendChild(el);
  });
}

// ── Trip editor ────────────────────────────────────────────────────────────────
function renderTripEditor() {
  const t = activeTrip();
  const editor = document.getElementById('trip-editor');
  const noTrip = document.getElementById('no-trip-state');

  if (!t) {
    editor.style.display = 'none';
    noTrip.style.display = 'flex';
    return;
  }

  noTrip.style.display = 'none';
  editor.style.display = 'flex';
  editor.style.flexDirection = 'column';
  editor.style.flex = '1';

  document.getElementById('trip-name-input').value = t.name || '';
  document.getElementById('start-date').value = t.start || '';
  document.getElementById('end-date').value = t.end || '';
  document.title = t.name ? `${t.name} — Road Trip` : 'Road Trip Planner';
  document.getElementById('trip-links-panel').classList.remove('open');

  renderTripLinks();
  renderCalendar();
}

// ── Top bar inputs ─────────────────────────────────────────────────────────────
document.getElementById('trip-name-input').addEventListener('input', e => {
  const t = activeTrip(); if (!t) return;
  t.name = e.target.value;
  document.title = t.name ? `${t.name} — Road Trip` : 'Road Trip Planner';
  dbSave(); renderSidebar();
});
document.getElementById('start-date').addEventListener('change', e => {
  const t = activeTrip(); if (!t) return;
  t.start = e.target.value; dbSave(); renderSidebar(); renderCalendar();
});
document.getElementById('end-date').addEventListener('change', e => {
  const t = activeTrip(); if (!t) return;
  t.end = e.target.value; dbSave(); renderSidebar(); renderCalendar();
});

// ── New trip ───────────────────────────────────────────────────────────────────
document.getElementById('btn-new-trip').addEventListener('click', () => {
  const id = uid();
  db.trips[id] = makeTrip(id);
  db.activeId = id;
  dbSave(); renderSidebar(); renderTripEditor();
  setTimeout(() => document.getElementById('trip-name-input').focus(), 50);
});

// ── Trip links ─────────────────────────────────────────────────────────────────
document.getElementById('btn-trip-links').addEventListener('click', () => {
  document.getElementById('trip-links-panel').classList.toggle('open');
});
document.getElementById('btn-add-trip-link').addEventListener('click', () => {
  const t = activeTrip(); if (!t) return;
  t.links.push({ label: '', url: '' });
  dbSave(); renderTripLinks();
});

function renderTripLinks() {
  const t = activeTrip();
  const editor = document.getElementById('trip-links-editor');
  const chips = document.getElementById('trip-links-chips');
  editor.innerHTML = ''; chips.innerHTML = '';
  if (!t) return;

  t.links.forEach((lk, i) => {
    const row = document.createElement('div');
    row.className = 'link-row';
    row.innerHTML = `
      <input type="text" placeholder="Label" value="${esc(lk.label)}" data-i="${i}" data-f="label">
      <input type="url" placeholder="https://…" value="${esc(lk.url)}" data-i="${i}" data-f="url">
      <button class="btn-rm-link" data-i="${i}">✕</button>
    `;
    row.querySelectorAll('input').forEach(inp => inp.addEventListener('input', ev => {
      t.links[+ev.target.dataset.i][ev.target.dataset.f] = ev.target.value;
      dbSave(); renderTripLinksChips();
    }));
    row.querySelector('button').addEventListener('click', ev => {
      t.links.splice(+ev.target.dataset.i, 1); dbSave(); renderTripLinks();
    });
    editor.appendChild(row);
  });
  renderTripLinksChips();
}

function renderTripLinksChips() {
  const t = activeTrip();
  const chips = document.getElementById('trip-links-chips');
  chips.innerHTML = '';
  if (!t) return;
  t.links.filter(l => l.url).forEach(l => {
    const a = document.createElement('a');
    a.href = l.url; a.target = '_blank'; a.rel = 'noopener noreferrer';
    a.textContent = l.label || l.url;
    chips.appendChild(a);
  });
}

// ── Calendar ───────────────────────────────────────────────────────────────────
const HOURS = Array.from({ length: 24 }, (_, i) => i);
const DAYS  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function renderCalendar() {
  const t = activeTrip();
  const noDates = document.getElementById('no-dates-state');
  const wrapper = document.getElementById('cal-wrapper');
  const cal     = document.getElementById('cal');

  if (!t || !t.start || !t.end || t.start > t.end) {
    noDates.style.display = 'flex'; wrapper.style.display = 'none'; return;
  }

  noDates.style.display = 'none'; wrapper.style.display = 'block';

  const dates = datesInRange(t.start, t.end);
  cal.innerHTML = '';

  // Time gutter
  const gutter = document.createElement('div');
  gutter.className = 'time-col';
  HOURS.forEach(h => {
    const tick = document.createElement('div');
    tick.className = 'time-tick';
    tick.textContent = h === 0 ? '12am' : h < 12 ? `${h}am` : h === 12 ? '12pm' : `${h - 12}pm`;
    gutter.appendChild(tick);
  });
  cal.appendChild(gutter);

  // Day columns
  dates.forEach(iso => {
    const d = new Date(iso + 'T00:00:00');
    const col = document.createElement('div');
    col.className = 'day-col';

    const head = document.createElement('div');
    head.className = 'day-head';
    head.innerHTML = `<span class="dn">${d.getDate()}</span>${DAYS[d.getDay()]} ${MONTHS[d.getMonth()]}`;
    col.appendChild(head);

    HOURS.forEach(h => {
      const slot = document.createElement('div');
      slot.className = 'hour-slot';
      slot.addEventListener('click', () => openEventModal(iso, h));
      col.appendChild(slot);
    });

    (t.events[iso] || []).forEach(ev => placeEvent(col, ev, iso));
    cal.appendChild(col);
  });
}

function placeEvent(col, ev, iso) {
  const top    = 48 + (toMin(ev.start) / 60) * 60;
  const height = Math.max(((toMin(ev.end) - toMin(ev.start)) / 60) * 60, 22);
  const el = document.createElement('div');
  el.className = 'ev'; el.dataset.type = ev.type;
  el.style.top = top + 'px'; el.style.height = height + 'px';
  const emoji = { Food:'🍔', Travel:'🚗', Activity:'🎯', Free:'😎' };
  el.innerHTML = `<div class="et">${emoji[ev.type] || ''} ${esc(ev.title)}</div><div class="eT">${ev.start}–${ev.end}${ev.location ? ' · ' + esc(ev.location) : ''}</div>`;
  el.addEventListener('click', e => { e.stopPropagation(); openEventModal(iso, null, ev); });
  col.appendChild(el);
}

// ── Event modal ────────────────────────────────────────────────────────────────
let mMode = 'new', mDate = null, mId = null, mType = 'Food', mLinks = [];

function openEventModal(iso, hour, ev) {
  mDate = iso;
  if (ev) {
    mMode = 'edit'; mId = ev.id; mType = ev.type;
    mLinks = JSON.parse(JSON.stringify(ev.links || []));
    document.getElementById('modal-heading').textContent = 'Edit Event';
    document.getElementById('ev-title').value = ev.title;
    document.getElementById('ev-start').value = ev.start;
    document.getElementById('ev-end').value = ev.end;
    document.getElementById('ev-location').value = ev.location || '';
    document.getElementById('ev-notes').value = ev.notes || '';
    document.getElementById('btn-delete-ev').style.display = 'block';
  } else {
    mMode = 'new'; mId = null; mType = 'Food'; mLinks = [];
    document.getElementById('modal-heading').textContent = 'Add Event';
    document.getElementById('ev-title').value = '';
    document.getElementById('ev-start').value = `${String(hour).padStart(2,'0')}:00`;
    document.getElementById('ev-end').value   = `${String(Math.min(hour+1,23)).padStart(2,'0')}:00`;
    document.getElementById('ev-location').value = '';
    document.getElementById('ev-notes').value = '';
    document.getElementById('btn-delete-ev').style.display = 'none';
  }
  setPill(mType);
  renderEvLinks();
  document.getElementById('event-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('ev-title').focus(), 50);
}

function setPill(type) {
  mType = type;
  document.querySelectorAll('.pill').forEach(p => p.classList.toggle('on', p.dataset.t === type));
}
document.querySelectorAll('.pill').forEach(p => p.addEventListener('click', () => setPill(p.dataset.t)));

function renderEvLinks() {
  const list = document.getElementById('ev-links-list');
  list.innerHTML = '';
  mLinks.forEach((lk, i) => {
    const row = document.createElement('div');
    row.className = 'link-row';
    row.innerHTML = `
      <input type="text" placeholder="Label" value="${esc(lk.label)}" data-i="${i}" data-f="label">
      <input type="url" placeholder="https://…" value="${esc(lk.url)}" data-i="${i}" data-f="url">
      <button class="btn-rm-link" data-i="${i}">✕</button>
    `;
    row.querySelectorAll('input').forEach(inp => inp.addEventListener('input', ev => {
      mLinks[+ev.target.dataset.i][ev.target.dataset.f] = ev.target.value;
    }));
    row.querySelector('button').addEventListener('click', ev => {
      mLinks.splice(+ev.target.dataset.i, 1); renderEvLinks();
    });
    list.appendChild(row);
  });
}

document.getElementById('btn-add-ev-link').addEventListener('click', () => { mLinks.push({ label:'', url:'' }); renderEvLinks(); });

function closeModal() { document.getElementById('event-modal').style.display = 'none'; }
document.getElementById('btn-cancel-ev').addEventListener('click', closeModal);
document.getElementById('event-modal').addEventListener('click', e => { if (e.target.id === 'event-modal') closeModal(); });

document.getElementById('btn-save-ev').addEventListener('click', () => {
  const title = document.getElementById('ev-title').value.trim();
  if (!title) { document.getElementById('ev-title').focus(); return; }
  const start = document.getElementById('ev-start').value;
  const end   = document.getElementById('ev-end').value;
  if (!start || !end) return;

  const t = activeTrip(); if (!t) return;
  if (!t.events[mDate]) t.events[mDate] = [];

  const location = document.getElementById('ev-location').value.trim();
  const notes    = document.getElementById('ev-notes').value;
  const links    = mLinks.filter(l => l.url);

  if (mMode === 'new') {
    t.events[mDate].push({ id: uid(), type: mType, title, start, end, location, notes, links });
  } else {
    const idx = t.events[mDate].findIndex(e => e.id === mId);
    if (idx !== -1) t.events[mDate][idx] = { id: mId, type: mType, title, start, end, location, notes, links };
  }

  dbSave(); closeModal(); renderCalendar();
});

document.getElementById('btn-delete-ev').addEventListener('click', () => {
  if (!confirm('Delete this event?')) return;
  const t = activeTrip(); if (!t) return;
  t.events[mDate] = (t.events[mDate] || []).filter(e => e.id !== mId);
  dbSave(); closeModal(); renderCalendar();
});

// ── Boot ───────────────────────────────────────────────────────────────────────
renderSidebar();
renderTripEditor();
</script>
</body>
