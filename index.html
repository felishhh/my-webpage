<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Road Trip Planner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8fafc; --surface: #ffffff; --surface2: #f1f5f9;
      --border: #e2e8f0; --text: #0f172a; --muted: #64748b; --accent: #0284c7;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* в”Җв”Җ Sidebar в”Җв”Җ */
    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: 260px;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; z-index: 10;
    }
    #sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
    #sidebar-header h1 { font-size: 1.1rem; color: var(--accent); margin-bottom: 12px; }
    #btn-new-trip {
      width: 100%; background: var(--accent); color: #fff; border: none;
      padding: 8px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: .88rem;
    }
    #btn-new-trip:hover { opacity: .88; }
    #trips-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
    .trip-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; position: relative; }
    .trip-item:hover { background: var(--surface2); }
    .trip-item.active { background: #e0f2fe; border-color: #7dd3fc; }
    .trip-item-name { font-size: .88rem; font-weight: 600; }
    .trip-item-dates { font-size: .72rem; color: var(--muted); margin-top: 2px; }
    .trip-item-delete {
      position: absolute; top: 8px; right: 8px; background: none; border: none;
      color: var(--muted); cursor: pointer; font-size: .8rem; opacity: 0; padding: 2px 5px; border-radius: 4px;
    }
    .trip-item:hover .trip-item-delete { opacity: 1; }
    .trip-item-delete:hover { color: #ef4444; background: rgba(239,68,68,.1); }
    .sidebar-empty { color: var(--muted); font-size: .82rem; text-align: center; padding: 20px 0; }

    /* в”Җв”Җ File bar в”Җв”Җ */
    #file-bar { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
    #file-status { font-size: .72rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #file-status.linked { color: #16a34a; font-weight: 600; }
    #file-status.unsaved { color: #d97706; }
    .file-btns { display: flex; gap: 5px; }
    .btn-file { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 5px 0; border-radius: 5px; cursor: pointer; font-size: .75rem; text-align: center; }
    .btn-file:hover { border-color: var(--accent); color: var(--accent); }
    #file-unsupported { font-size: .7rem; color: #dc2626; padding: 4px 0; display: none; }

    /* в”Җв”Җ Main в”Җв”Җ */
    #main { margin-left: 260px; display: flex; flex-direction: column; min-height: 100vh; }

    /* в”Җв”Җ Top bar в”Җв”Җ */
    #topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .topbar-input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 11px; border-radius: 6px; font-size: .9rem; }
    #trip-name-input { width: 200px; font-size: 1rem; }
    input[type="date"].topbar-input { color-scheme: light; }
    .date-group { display: flex; align-items: center; gap: 6px; }
    .date-group label { color: var(--muted); font-size: .8rem; white-space: nowrap; }
    #btn-trip-links { margin-left: auto; background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: .82rem; }
    #btn-trip-links:hover { background: #e0f2fe; }

    /* в”Җв”Җ Trip links panel в”Җв”Җ */
    #trip-links-panel { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: none; flex-direction: column; gap: 10px; }
    #trip-links-panel.open { display: flex; }
    #trip-links-panel h3 { font-size: .85rem; color: var(--muted); }
    .links-editor { display: flex; flex-direction: column; gap: 6px; }
    .link-row { display: flex; gap: 6px; }
    .link-row input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 9px; border-radius: 5px; font-size: .85rem; flex: 1; }
    .link-row input:first-child { max-width: 140px; }
    .btn-rm-link { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 5px; cursor: pointer; padding: 4px 8px; font-size: .8rem; }
    .btn-rm-link:hover { color: #ef4444; border-color: #ef4444; }
    .btn-add-link { background: none; border: 1px dashed var(--border); color: var(--muted); border-radius: 6px; padding: 6px; cursor: pointer; font-size: .8rem; text-align: center; }
    .btn-add-link:hover { border-color: var(--accent); color: var(--accent); }
    .links-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .links-chips a { color: var(--accent); font-size: .8rem; text-decoration: none; background: #e0f2fe; padding: 2px 10px; border-radius: 4px; border: 1px solid #7dd3fc; }
    .links-chips a:hover { text-decoration: underline; }

    /* в”Җв”Җ Legend в”Җв”Җ */
    #legend { display: flex; gap: 14px; padding: 8px 20px; flex-wrap: wrap; background: var(--surface); border-bottom: 1px solid var(--border); align-items: center; }
    .leg { display: flex; align-items: center; gap: 5px; font-size: .76rem; color: var(--muted); }
    .leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    #btn-manage-types { margin-left: auto; background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 5px 13px; border-radius: 6px; cursor: pointer; font-size: .78rem; }
    #btn-manage-types:hover { border-color: var(--accent); color: var(--accent); }

    /* в”Җв”Җ Types panel в”Җв”Җ */
    #types-panel { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: none; flex-direction: column; gap: 12px; }
    #types-panel.open { display: flex; }
    #types-panel h3 { font-size: .85rem; color: var(--muted); }
    .type-row { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); }
    .type-row-icon { font-size: 1.1rem; width: 26px; text-align: center; flex-shrink: 0; }
    .type-row-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .type-row-name { font-size: .85rem; font-weight: 600; flex: 1; }
    .type-row-tag { font-size: .68rem; color: var(--muted); background: var(--bg); border: 1px solid var(--border); padding: 1px 7px; border-radius: 10px; }
    .btn-type-edit { background: none; border: 1px solid var(--border); color: var(--muted); padding: 3px 10px; border-radius: 5px; cursor: pointer; font-size: .75rem; }
    .btn-type-edit:hover { border-color: var(--accent); color: var(--accent); }
    .btn-type-del { background: none; border: 1px solid var(--border); color: var(--muted); padding: 3px 8px; border-radius: 5px; cursor: pointer; font-size: .75rem; }
    .btn-type-del:hover { border-color: #ef4444; color: #ef4444; }

    /* в”Җв”Җ Empty states в”Җв”Җ */
    .center-msg { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--muted); padding: 40px; }
    .center-msg .icon { font-size: 3rem; }
    .center-msg p { font-size: .95rem; }

    /* в”Җв”Җ Calendar в”Җв”Җ */
    #cal-wrapper { overflow-x: auto; padding: 20px; flex: 1; }
    #cal { display: flex; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; min-width: max-content; }
    .time-col { width: 54px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); padding-top: 48px; }
    .time-tick { height: 60px; display: flex; align-items: flex-start; justify-content: flex-end; padding: 4px 7px 0 0; font-size: .68rem; color: var(--muted); }
    .day-col { flex: 1; min-width: 170px; border-right: 1px solid var(--border); background: var(--bg); position: relative; }
    .day-col:last-child { border-right: none; }
    .day-head { height: 48px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: .82rem; position: sticky; top: 0; z-index: 2; }
    .day-head .dn { font-size: 1.25rem; color: var(--accent); margin-right: 5px; }
    .hour-slot { height: 60px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
    .hour-slot:hover { background: #f0f9ff; }
    .hour-slot:last-child { border-bottom: none; }
    .ev {
      position: absolute; left: 3px; right: 3px; border-radius: 5px;
      padding: 3px 6px; font-size: .7rem; font-weight: 600; color: #fff;
      cursor: pointer; overflow: hidden; z-index: 1; opacity: .93;
      transition: opacity .12s, transform .12s; display: flex; flex-direction: column; gap: 1px;
    }
    .ev:hover { opacity: 1; transform: scaleX(1.015); }
    .ev.addon { opacity: .7; border: 2px dashed rgba(255,255,255,.7); background-clip: padding-box; }
    .ev .et { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ev .eT { font-weight: 400; opacity: .85; font-size: .63rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ev .e-opts { font-size: .6rem; opacity: .8; font-weight: 400; margin-top: 1px; }

    /* в”Җв”Җ Modal в”Җв”Җ */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 100%; max-width: 520px; max-height: 92vh; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
    .modal h2 { font-size: 1.05rem; color: var(--accent); }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: .77rem; color: var(--muted); font-weight: 500; }
    .field input, .field textarea { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: 6px; font-size: .88rem; width: 100%; color-scheme: light; }
    .field textarea { resize: vertical; min-height: 55px; font-family: inherit; }
    .two-col { display: flex; gap: 10px; }
    .two-col .field { flex: 1; }
    hr.divider { border: none; border-top: 1px solid var(--border); margin: 0; }

    /* в”Җв”Җ Type pills (selection only in modal) в”Җв”Җ */
    .pills-wrap { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .pill { padding: 5px 12px; border-radius: 20px; border: 2px solid transparent; cursor: pointer; font-size: .8rem; font-weight: 600; opacity: .4; transition: opacity .14s; display: flex; align-items: center; gap: 4px; color: #fff; }
    .pill.on { opacity: 1; }

    /* в”Җв”Җ Type inline form (create or edit) в”Җв”Җ */
    .type-form { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 2px; }
    .type-form h4 { font-size: .82rem; color: var(--muted); font-weight: 600; }
    .type-form input[type="text"] { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: 6px; font-size: .88rem; width: 100%; }
    .color-swatches { display: flex; gap: 6px; flex-wrap: wrap; }
    .swatch { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform .1s; flex-shrink: 0; }
    .swatch.on { border-color: var(--text); transform: scale(1.2); }
    .icon-grid { display: flex; flex-wrap: wrap; gap: 4px; }
    .icon-cell { width: 30px; height: 30px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: .95rem; display: flex; align-items: center; justify-content: center; transition: background .1s; }
    .icon-cell:hover { background: #e0f2fe; }
    .icon-cell.on { background: #bae6fd; border-color: var(--accent); }
    .type-form-actions { display: flex; gap: 6px; justify-content: flex-end; }

    /* в”Җв”Җ Options / alternatives в”Җв”Җ */
    .options-list { display: flex; flex-direction: column; gap: 8px; }
    .option-card { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .option-card-head { display: flex; align-items: center; gap: 6px; padding: 8px 10px; background: var(--surface2); border-bottom: 1px solid var(--border); }
    .option-status-badge { font-size: .7rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; flex-shrink: 0; }
    .option-status-badge.selected { background: #dcfce7; color: #15803d; }
    .option-status-badge.considering { background: #f1f5f9; color: var(--muted); }
    .btn-select-opt { font-size: .72rem; padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); background: none; color: var(--muted); cursor: pointer; margin-left: auto; }
    .btn-select-opt:hover { border-color: #15803d; color: #15803d; }
    .btn-select-opt.is-selected { background: #dcfce7; border-color: #86efac; color: #15803d; cursor: default; }
    .btn-rm-opt { background: none; border: none; color: var(--muted); cursor: pointer; font-size: .85rem; padding: 2px 4px; border-radius: 4px; }
    .btn-rm-opt:hover { color: #ef4444; }
    .option-card-body { padding: 10px; display: flex; flex-direction: column; gap: 7px; }
    .option-card-body input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 9px; border-radius: 5px; font-size: .84rem; width: 100%; }
    .option-card-body textarea { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 9px; border-radius: 5px; font-size: .84rem; width: 100%; resize: vertical; min-height: 48px; font-family: inherit; }
    .option-links { display: flex; flex-direction: column; gap: 5px; }

    /* в”Җв”Җ Add-on toggle в”Җв”Җ */
    .addon-toggle { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 7px; border: 1px solid var(--border); cursor: pointer; background: var(--surface2); }
    .addon-toggle input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--accent); }
    .addon-toggle span { font-size: .82rem; color: var(--muted); }
    .addon-toggle:has(input:checked) { border-color: var(--accent); background: #e0f2fe; }
    .addon-toggle:has(input:checked) span { color: var(--accent); font-weight: 600; }

    /* в”Җв”Җ Shared small buttons в”Җв”Җ */
    .btn-sm { padding: 5px 12px; border-radius: 5px; font-size: .8rem; cursor: pointer; font-weight: 600; }
    .btn-sm.primary { background: var(--accent); color: #fff; border: none; }
    .btn-sm.primary:hover { opacity: .88; }
    .btn-sm.ghost { background: none; border: 1px solid var(--border); color: var(--muted); }
    .btn-sm.ghost:hover { color: var(--text); }

    /* в”Җв”Җ Modal actions в”Җв”Җ */
    .modal-links { display: flex; flex-direction: column; gap: 5px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
    .btn-primary { background: var(--accent); color: #fff; border: none; padding: 8px 20px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: .88rem; }
    .btn-primary:hover { opacity: .88; }
    .btn-ghost { background: none; border: 1px solid var(--border); color: var(--muted); padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: .88rem; }
    .btn-ghost:hover { border-color: var(--text); color: var(--text); }
    .btn-delete { background: none; border: 1px solid #ef4444; color: #ef4444; padding: 8px 13px; border-radius: 6px; cursor: pointer; font-size: .88rem; margin-right: auto; }
    .btn-delete:hover { background: rgba(239,68,68,.1); }
  </style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <h1>рҹҡ— Road Trip Planner</h1>
    <button id="btn-new-trip">+ New Trip</button>
  </div>
  <div id="file-bar">
    <div id="file-status">рҹ’ҫ No file linked</div>
    <div class="file-btns">
      <button class="btn-file" id="btn-open-file">рҹ“Ӯ Open</button>
      <button class="btn-file" id="btn-save-file">рҹ’ҫ Save As</button>
    </div>
    <div id="file-unsupported">вҡ пёҸ Use Chrome or Edge for file support</div>
  </div>
  <div id="trips-list"></div>
</div>

<!-- Main -->
<div id="main">
  <div id="no-trip-state" class="center-msg" style="display:none">
    <div class="icon">рҹ—әпёҸ</div>
    <p>Select a trip or create a new one</p>
  </div>
  <div id="trip-editor" style="display:none">
    <div id="topbar">
      <input id="trip-name-input" class="topbar-input" type="text" placeholder="Trip nameвҖҰ">
      <div class="date-group"><label>Start</label><input id="start-date" class="topbar-input" type="date"></div>
      <div class="date-group"><label>End</label><input id="end-date" class="topbar-input" type="date"></div>
      <button id="btn-trip-links">рҹ”— Trip Links</button>
    </div>
    <div id="trip-links-panel">
      <h3>Trip Links & Resources</h3>
      <div class="links-editor" id="trip-links-editor"></div>
      <button class="btn-add-link" id="btn-add-trip-link">+ Add link</button>
      <div class="links-chips" id="trip-links-chips"></div>
    </div>
    <div id="types-panel">
      <h3>Event Types</h3>
      <div id="types-list"></div>
      <button class="btn-add-link" id="btn-add-type-row">+ New Type</button>
      <div id="types-create-form"></div>
    </div>
    <div id="legend"></div>
    <div id="no-dates-state" class="center-msg" style="display:none">
      <div class="icon">рҹ“…</div>
      <p>Enter start and end dates above to see your calendar</p>
    </div>
    <div id="cal-wrapper" style="display:none"><div id="cal"></div></div>
  </div>
</div>

<!-- Event Modal -->
<div class="overlay" id="event-modal" style="display:none">
  <div class="modal">
    <h2 id="modal-heading">Add Event</h2>

    <!-- Type -->
    <div class="field">
      <label>Type</label>
      <div class="pills-wrap" id="type-pills"></div>
    </div>

    <hr class="divider">

    <!-- Core fields -->
    <div class="field" id="ev-date-field"><label>Date</label><input type="date" id="ev-date" class="topbar-input" style="width:100%"></div>
    <div class="field"><label>Title</label><input type="text" id="ev-title" placeholder="e.g. Afternoon Hike"></div>
    <div class="two-col">
      <div class="field"><label>Start time</label><input type="time" id="ev-start"></div>
      <div class="field"><label>End time</label><input type="time" id="ev-end"></div>
    </div>
    <div class="field"><label>Location</label><input type="text" id="ev-location" placeholder="e.g. 123 Main St, Nashville, TN"></div>
    <div class="field"><label>Notes</label><textarea id="ev-notes" placeholder="Details, remindersвҖҰ"></textarea></div>
    <div class="field">
      <label>Links</label>
      <div class="modal-links" id="ev-links-list"></div>
      <button class="btn-add-link" id="btn-add-ev-link" style="margin-top:5px">+ Add link</button>
    </div>

    <hr class="divider">

    <!-- Options / alternatives -->
    <div class="field">
      <label>Options / Alternatives <span style="font-weight:400;color:var(--muted)">(e.g. 3 potential hikes)</span></label>
      <div class="options-list" id="ev-options-list"></div>
      <button class="btn-add-link" id="btn-add-option" style="margin-top:6px">+ Add option</button>
    </div>

    <!-- Add-on toggle -->
    <label class="addon-toggle">
      <input type="checkbox" id="ev-is-addon">
      <span>вҠ• Mark as optional / add-on activity</span>
    </label>

    <div class="modal-actions">
      <button class="btn-delete" id="btn-delete-ev" style="display:none">Delete</button>
      <button class="btn-ghost" id="btn-cancel-ev">Cancel</button>
      <button class="btn-primary" id="btn-save-ev">Save</button>
    </div>
  </div>
</div>

<script>
// в”Җв”Җ Constants в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const LS_KEY    = 'rtp-v3';
const IDB_NAME  = 'rtp-fsh';
const IDB_STORE = 'handles';
const IDB_KEY   = 'tripsFile';

const BUILT_IN = [
  { id: 'Food',     name: 'Food',      color: '#ea6c0a', icon: 'рҹҚ”' },
  { id: 'Travel',   name: 'Travel',    color: '#2563eb', icon: 'рҹҡ—' },
  { id: 'Activity', name: 'Activity',  color: '#059669', icon: 'рҹҺҜ' },
  { id: 'Free',     name: 'Free Time', color: '#7c3aed', icon: 'рҹҳҺ' },
];

const PRESET_COLORS = [
  '#ef4444','#f97316','#eab308','#22c55e',
  '#06b6d4','#3b82f6','#8b5cf6','#ec4899',
  '#64748b','#1e293b',
];

const EMOJI_SET = [

// в”Җв”Җ Storage в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let fileHandle = null, fileLinked = false, pendingSave = false;

function lsLoad() { try { const r = localStorage.getItem(LS_KEY); return r ? JSON.parse(r) : null; } catch { return null; } }
function lsSave() { try { localStorage.setItem(LS_KEY, JSON.stringify(db)); } catch {} }

function openIDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}
async function idbSaveHandle(h) { try { const idb = await openIDB(); idb.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).put(h, IDB_KEY); } catch {} }
async function idbLoadHandle() {
  try {
    const idb = await openIDB();
    return await new Promise((res,rej) => { const req = idb.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(IDB_KEY); req.onsuccess=e=>res(e.target.result); req.onerror=e=>rej(e.target.error); });
  } catch { return null; }
}
async function idbClearHandle() { try { const idb = await openIDB(); idb.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).delete(IDB_KEY); } catch {} }
async function readFromHandle(h) { return JSON.parse(await (await h.getFile()).text()); }
async function writeToHandle(h) { const w = await h.createWritable(); await w.write(JSON.stringify(db,null,2)); await w.close(); }

function dbSave() {
  lsSave();
  if (!fileLinked || !fileHandle) return;
  setFileStatus('unsaved');
  if (!pendingSave) {
    pendingSave = true;
    setTimeout(async () => {
      try { await writeToHandle(fileHandle); setFileStatus('saved'); }
      catch { setFileStatus('error'); }
      pendingSave = false;
    }, 400);
  }
}

function setFileStatus(state) {
  const el = document.getElementById('file-status');
  el.onclick = null; el.style.cursor = '';
  const name = fileHandle ? fileHandle.name : '';
  if (state==='none')    { el.className='';        el.textContent='рҹ’ҫ No file linked'; }
  if (state==='linked')  { el.className='linked';  el.textContent=`вң… ${name}`; }
  if (state==='unsaved') { el.className='unsaved'; el.textContent='в—Ҹ SavingвҖҰ'; }
  if (state==='saved')   { el.className='linked';  el.textContent=`вң… ${name}`; }
  if (state==='error')   { el.className='unsaved'; el.textContent='вҡ пёҸ Save failed'; }
}

function applyLoadedData(data) {
  if (!data || typeof data.trips !== 'object') return false;
  db = data;
  if (!db.customTypes)    db.customTypes = [];
  if (!db.typeOverrides)  db.typeOverrides = {};
  if (!db.trips[db.activeId]) db.activeId = Object.keys(db.trips)[0] || null;
  return true;
}

async function openFile() {
  if (!window.showOpenFilePicker) { document.getElementById('file-unsupported').style.display='block'; return; }
  try {
    const [h] = await window.showOpenFilePicker({ types:[{description:'Trip JSON',accept:{'application/json':['.json']}}] });
    applyLoadedData(await readFromHandle(h));
    fileHandle=h; fileLinked=true; await idbSaveHandle(h);
    setFileStatus('linked'); lsSave(); renderSidebar(); renderTripEditor();
  } catch(e) { if (e.name!=='AbortError') alert('Could not open file:\n'+e.message); }
}

async function saveFileAs() {
  if (!window.showSaveFilePicker) { document.getElementById('file-unsupported').style.display='block'; return; }
  try {
    const h = await window.showSaveFilePicker({ suggestedName:'trips.json', types:[{description:'Trip JSON',accept:{'application/json':['.json']}}] });
    await writeToHandle(h); fileHandle=h; fileLinked=true; await idbSaveHandle(h); setFileStatus('linked');
  } catch(e) { if (e.name!=='AbortError') alert('Could not save:\n'+e.message); }
}

async function tryRestoreHandle() {
  if (!window.showOpenFilePicker) { document.getElementById('file-unsupported').style.display='block'; return; }
  const h = await idbLoadHandle(); if (!h) return;
  try {
    const perm = await h.queryPermission({ mode:'readwrite' });
    if (perm==='granted') {
      applyLoadedData(await readFromHandle(h));
      fileHandle=h; fileLinked=true; setFileStatus('linked'); lsSave(); renderSidebar(); renderTripEditor(); return;
    }
    if (perm==='prompt') {
      const el = document.getElementById('file-status');
      el.className='unsaved'; el.textContent=`рҹ”— Click to reload ${h.name}`; el.style.cursor='pointer';
      el.onclick = async () => {
        el.onclick=null; el.style.cursor='';
        try {
          if (await h.requestPermission({mode:'readwrite'})==='granted') {
            applyLoadedData(await readFromHandle(h));
            fileHandle=h; fileLinked=true; setFileStatus('linked'); lsSave(); renderSidebar(); renderTripEditor();
          }
        } catch {}
      };
    }
  } catch { await idbClearHandle(); }
}

// в”Җв”Җ DB init в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function makeTrip(id) { return { id, name:'', start:'', end:'', links:[], events:{} }; }

let db = lsLoad();
if (!db || typeof db.trips !== 'object') {
  const id = uid();
  db = { activeId:id, trips:{ [id]: makeTrip(id) }, customTypes:[], typeOverrides:{} };
} else {
  if (!db.customTypes)   db.customTypes = [];
  if (!db.typeOverrides) db.typeOverrides = {};
}
if (!db.trips[db.activeId]) db.activeId = Object.keys(db.trips)[0] || null;

function activeTrip() { return db.trips[db.activeId] || null; }

// Types: built-in with optional overrides + custom
function allTypes() {
  const ov = db.typeOverrides || {};
  return [
    ...BUILT_IN.map(t => ov[t.id] ? { ...t, ...ov[t.id] } : t),
    ...db.customTypes,
  ];
}
function getType(id) { return allTypes().find(t => t.id === id) || allTypes()[0]; }
function isBuiltIn(id) { return BUILT_IN.some(t => t.id === id); }

// в”Җв”Җ Helpers в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function uid() { return 't' + Date.now() + Math.random().toString(36).slice(2,6); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toMin(t) { const [h,m]=t.split(':').map(Number); return h*60+m; }
function fmtDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function datesInRange(s,e) { const l=[],c=new Date(s+'T00:00:00'),last=new Date(e+'T00:00:00'); while(c<=last){l.push(fmtDate(c));c.setDate(c.getDate()+1);} return l; }
function fmtDateLabel(iso) { return new Date(iso+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function tripDateLabel(t) {
  if (!t.start&&!t.end) return 'No dates set';
  if (t.start&&t.end) return `${fmtDateLabel(t.start)} вҖ“ ${fmtDateLabel(t.end)}`;
  return t.start?`From ${fmtDateLabel(t.start)}`:`Until ${fmtDateLabel(t.end)}`;
}

// в”Җв”Җ Sidebar в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderSidebar() {
  const list = document.getElementById('trips-list');
  const trips = Object.values(db.trips).sort((a,b) => b.id>a.id?1:-1);
  list.innerHTML = '';
  if (!trips.length) { list.innerHTML='<div class="sidebar-empty">No trips yet</div>'; return; }
  trips.forEach(t => {
    const el = document.createElement('div');
    el.className = 'trip-item'+(t.id===db.activeId?' active':'');
    el.innerHTML = `<div class="trip-item-name">${esc(t.name||'Untitled Trip')}</div><div class="trip-item-dates">${tripDateLabel(t)}</div><button class="trip-item-delete" title="Delete">вң•</button>`;
    el.addEventListener('click', e => { if(e.target.closest('.trip-item-delete')) return; db.activeId=t.id; dbSave(); renderSidebar(); renderTripEditor(); });
    el.querySelector('.trip-item-delete').addEventListener('click', e => {
      e.stopPropagation();
      if (!confirm(`Delete "${t.name||'Untitled Trip'}"?`)) return;
      delete db.trips[t.id];
      if (db.activeId===t.id) { const rem=Object.keys(db.trips); if(!rem.length){const nid=uid();db.trips[nid]=makeTrip(nid);db.activeId=nid;}else db.activeId=rem[0]; }
      dbSave(); renderSidebar(); renderTripEditor();
    });
    list.appendChild(el);
  });
}

function renderLegend() {

  lg.style.cssText = 'display:flex;gap:14px;padding:8px 20px;flex-wrap:wrap;background:var(--surface);border-bottom:1px solid var(--border);align-items:center;';
  allTypes().forEach(t => {
    const d = document.createElement('div'); d.className='leg';
    d.innerHTML = `<div class="leg-dot" style="background:${t.color}"></div> ${esc(t.name)}`;
    lg.appendChild(d);
  });
  const btn = document.createElement('button');
  btn.id='btn-manage-types'; btn.textContent='вҡҷпёҸ Types';

  lg.appendChild(btn);
}

function renderTripEditor() {
  const t = activeTrip();

// в”Җв”Җ Top bar в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
document.getElementById('trip-name-input').addEventListener('input', e => { const t=activeTrip();if(!t)return;t.name=e.target.value;document.title=t.name?`${t.name} вҖ” Road Trip`:'Road Trip Planner';dbSave();renderSidebar(); });
document.getElementById('start-date').addEventListener('change', e => { const t=activeTrip();if(!t)return;t.start=e.target.value;dbSave();renderSidebar();renderCalendar(); });
document.getElementById('end-date').addEventListener('change', e => { const t=activeTrip();if(!t)return;t.end=e.target.value;dbSave();renderSidebar();renderCalendar(); });

// в”Җв”Җ Trip links в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
document.getElementById('btn-trip-links').addEventListener('click', () => document.getElementById('trip-links-panel').classList.toggle('open'));
document.getElementById('btn-add-trip-link').addEventListener('click', () => { const t=activeTrip();if(!t)return;t.links.push({label:'',url:''});dbSave();renderTripLinks(); });
function renderTripLinks() {
  const t=activeTrip(), editor=document.getElementById('trip-links-editor'), chips=document.getElementById('trip-links-chips');
  editor.innerHTML=''; chips.innerHTML=''; if(!t)return;
  t.links.forEach((lk,i) => {
    const row=document.createElement('div'); row.className='link-row';
    row.innerHTML=`<input type="text" placeholder="Label" value="${esc(lk.label)}" data-i="${i}" data-f="label"><input type="url" placeholder="https://вҖҰ" value="${esc(lk.url)}" data-i="${i}" data-f="url"><button class="btn-rm-link" data-i="${i}">вң•</button>`;
    row.querySelectorAll('input').forEach(inp=>inp.addEventListener('input',ev=>{t.links[+ev.target.dataset.i][ev.target.dataset.f]=ev.target.value;dbSave();renderTripLinksChips();}));
    row.querySelector('button').addEventListener('click',ev=>{t.links.splice(+ev.target.dataset.i,1);dbSave();renderTripLinks();});
    editor.appendChild(row);
  });
  renderTripLinksChips();
}
function renderTripLinksChips() {
  const t=activeTrip(), chips=document.getElementById('trip-links-chips'); chips.innerHTML=''; if(!t)return;
  t.links.filter(l=>l.url).forEach(l=>{const a=document.createElement('a');a.href=l.url;a.target='_blank';a.rel='noopener noreferrer';a.textContent=l.label||l.url;chips.appendChild(a);});
}

// в”Җв”Җ Calendar в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderCalendar() {
  const t=activeTrip(), noDates=document.getElementById('no-dates-state'), wrapper=document.getElementById('cal-wrapper'), cal=document.getElementById('cal');
  if (!t||!t.start||!t.end||t.start>t.end) { noDates.style.display='flex'; wrapper.style.display='none'; return; }
  noDates.style.display='none'; wrapper.style.display='block';
  const dates=datesInRange(t.start,t.end); cal.innerHTML='';
  const gutter=document.createElement('div'); gutter.className='time-col';
  HOURS.forEach(h=>{const tick=document.createElement('div');tick.className='time-tick';tick.textContent=h===0?'12am':h<12?`${h}am`:h===12?'12pm':`${h-12}pm`;gutter.appendChild(tick);});
  cal.appendChild(gutter);
  dates.forEach(iso=>{
    const d=new Date(iso+'T00:00:00'), col=document.createElement('div'); col.className='day-col';
    const head=document.createElement('div'); head.className='day-head';
    head.innerHTML=`<span class="dn">${d.getDate()}</span>${DAYS[d.getDay()]} ${MONTHS[d.getMonth()]}`;
    col.appendChild(head);
    HOURS.forEach(h=>{const slot=document.createElement('div');slot.className='hour-slot';slot.addEventListener('click',()=>openEventModal(iso,h));col.appendChild(slot);});
    (t.events[iso]||[]).forEach(ev=>placeEvent(col,ev,iso));
    cal.appendChild(col);
  });
}

function placeEvent(col, ev, iso) {
  const top=48+(toMin(ev.start)/60)*60;
  const height=Math.max(((toMin(ev.end)-toMin(ev.start))/60)*60,22);
  const type=getType(ev.type);
  const el=document.createElement('div');
  el.className='ev'+(ev.isAddOn?' addon':'');
  el.style.top=top+'px'; el.style.height=height+'px'; el.style.background=type.color;

  // Subtitle: selected option name, or location
  const opts = ev.options||[];
  const sel  = opts.find(o=>o.status==='selected');
  const sub  = sel ? sel.name : (ev.location||'');
  const optsBadge = opts.length ? `<div class="e-opts">${ev.isAddOn?'вҠ• add-on В· ':''}${opts.length} option${opts.length!==1?'s':''}</div>` : (ev.isAddOn?'<div class="e-opts">вҠ• add-on</div>':'');

  el.innerHTML=`<div class="et">${type.icon} ${esc(ev.title)}</div><div class="eT">${ev.start}вҖ“${ev.end}${sub?' В· '+esc(sub):''}</div>${optsBadge}`;
  el.addEventListener('click',e=>{e.stopPropagation();openEventModal(iso,null,ev);});
  col.appendChild(el);
}

// в”Җв”Җ Modal state в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let mMode='new', mDate=null, mId=null, mType='Food', mLinks=[], mOptions=[], mIsAddOn=false;

function openEventModal(iso, hour, ev) {
  mDate=iso; typeFormMode=null;
  const dateField = document.getElementById('ev-date-field');
  const dateInput = document.getElementById('ev-date');

  if (ev) {
    mMode='edit'; mId=ev.id; mType=ev.type;
    mLinks=JSON.parse(JSON.stringify(ev.links||[]));
    mOptions=JSON.parse(JSON.stringify(ev.options||[]));
    mIsAddOn=!!ev.isAddOn;
    document.getElementById('modal-heading').textContent='Edit Event';
    document.getElementById('ev-title').value=ev.title;
    document.getElementById('ev-start').value=ev.start;
    document.getElementById('ev-end').value=ev.end;
    document.getElementById('ev-location').value=ev.location||'';
    document.getElementById('ev-notes').value=ev.notes||'';
    document.getElementById('btn-delete-ev').style.display='block';
    dateField.style.display='none';
  } else {
    mMode='new'; mId=null; mType='Food'; mLinks=[]; mOptions=[]; mIsAddOn=false;
    document.getElementById('modal-heading').textContent='Add Event';
    document.getElementById('ev-title').value='';
    document.getElementById('ev-location').value='';
    document.getElementById('ev-notes').value='';
    document.getElementById('btn-delete-ev').style.display='none';
    if (iso) {
      // Opened from a time slot click вҖ” date is known, hour is set
      dateField.style.display='none';
      document.getElementById('ev-start').value=`${String(hour).padStart(2,'0')}:00`;
      document.getElementById('ev-end').value=`${String(Math.min(hour+1,23)).padStart(2,'0')}:00`;
    } else {
      // Opened from the legend "Add Event" button вҖ” let user pick date
      const t=activeTrip();
      dateInput.value = t&&t.start ? t.start : '';
      dateInput.min = t&&t.start ? t.start : '';
      dateInput.max = t&&t.end   ? t.end   : '';
      dateField.style.display='flex';
      document.getElementById('ev-start').value='09:00';
      document.getElementById('ev-end').value='10:00';
    }
  }
  document.getElementById('ev-is-addon').checked=mIsAddOn;
  renderTypePills(); renderEvLinks(); renderEvOptions();
  document.getElementById('event-modal').style.display='flex';
  setTimeout(()=>document.getElementById('ev-title').focus(),50);
}

// в”Җв”Җ Type pills (modal: selection only) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderTypePills() {
  const wrap=document.getElementById('type-pills'); wrap.innerHTML='';
  allTypes().forEach(t=>{
    const pill=document.createElement('div');
    pill.className='pill'+(mType===t.id?' on':'');
    pill.style.background=t.color; pill.style.borderColor=t.color;
    pill.textContent=`${t.icon} ${t.name}`;
    pill.addEventListener('click',()=>{ mType=t.id; renderTypePills(); });
    wrap.appendChild(pill);
  });
}

// в”Җв”Җ Types panel (outside modal) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let tpEditId=null, tpColor=PRESET_COLORS[5], tpIcon='вӯҗ', tpShowCreate=false;

function renderTypesPanel() {
  const listEl=document.getElementById('types-list');
  const createEl=document.getElementById('types-create-form');
  listEl.innerHTML=''; createEl.innerHTML='';

  allTypes().forEach(t=>{
    const row=document.createElement('div'); row.className='type-row';
    row.innerHTML=`<div class="type-row-icon">${t.icon}</div><div class="type-row-dot" style="background:${t.color}"></div><div class="type-row-name">${esc(t.name)}</div>`;
    if (isBuiltIn(t.id)) {
      const tag=document.createElement('span'); tag.className='type-row-tag'; tag.textContent='built-in'; row.appendChild(tag);
    }
    const editBtn=document.createElement('button'); editBtn.className='btn-type-edit'; editBtn.textContent='вңҸпёҸ Edit';
    editBtn.addEventListener('click',()=>{ tpEditId=tpEditId===t.id?null:t.id; tpColor=t.color; tpIcon=t.icon; tpShowCreate=false; renderTypesPanel(); });
    row.appendChild(editBtn);
    if (!isBuiltIn(t.id)) {
      const delBtn=document.createElement('button'); delBtn.className='btn-type-del'; delBtn.textContent='вң•';
      delBtn.addEventListener('click',()=>{
        if (!confirm(`Delete type "${t.name}"?`)) return;
        db.customTypes=db.customTypes.filter(c=>c.id!==t.id);
        if (tpEditId===t.id) tpEditId=null;
        dbSave(); renderLegend(); renderTypesPanel(); renderCalendar();
      });
      row.appendChild(delBtn);
    }
    listEl.appendChild(row);

    // Inline edit form for this type
    if (tpEditId===t.id) {
      listEl.appendChild(buildTypeForm(false, t));
    }
  });

  // Create form
  if (tpShowCreate) {
    createEl.appendChild(buildTypeForm(true, null));
  }
}

function buildTypeForm(isCreate, editType) {
  let localColor = isCreate ? tpColor : editType.color;
  let localIcon  = isCreate ? tpIcon  : editType.icon;

  const form=document.createElement('div'); form.className='type-form';
  let nameInput=null;
  if (isCreate) {
    form.innerHTML='<h4>New Event Type</h4>';
    nameInput=document.createElement('input'); nameInput.type='text'; nameInput.placeholder='Type nameвҖҰ';
    form.appendChild(nameInput);
  } else {
    form.innerHTML=`<h4>Edit "${esc(editType.name)}"</h4>`;
  }

  // Color swatches
  const colorSect=document.createElement('div');
  colorSect.innerHTML='<div style="font-size:.75rem;color:var(--muted);margin-bottom:4px">Color</div>';
  const swatchRow=document.createElement('div'); swatchRow.className='color-swatches';
  PRESET_COLORS.forEach(c=>{
    const s=document.createElement('div'); s.className='swatch'+(localColor===c?' on':''); s.style.background=c;
    s.addEventListener('click',()=>{ localColor=c; swatchRow.querySelectorAll('.swatch').forEach(x=>x.classList.remove('on')); s.classList.add('on'); });
    swatchRow.appendChild(s);
  });
  colorSect.appendChild(swatchRow); form.appendChild(colorSect);

  // Icon grid
  const iconSect=document.createElement('div');
  iconSect.innerHTML='<div style="font-size:.75rem;color:var(--muted);margin-bottom:4px">Icon</div>';
  const grid=document.createElement('div'); grid.className='icon-grid';
  EMOJI_SET.forEach(em=>{
    const cell=document.createElement('div'); cell.className='icon-cell'+(localIcon===em?' on':''); cell.textContent=em;
    cell.addEventListener('click',()=>{ localIcon=em; grid.querySelectorAll('.icon-cell').forEach(x=>x.classList.remove('on')); cell.classList.add('on'); });
    grid.appendChild(cell);
  });
  iconSect.appendChild(grid); form.appendChild(iconSect);

  // Custom emoji input
  const customIn=document.createElement('input'); customIn.type='text'; customIn.placeholder='Or type any emoji'; customIn.maxLength=2;
  customIn.style.cssText='background:var(--surface);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:5px;font-size:.9rem;width:100%;';
  customIn.addEventListener('input',e=>{ const v=e.target.value.trim(); if(!v)return; localIcon=v; grid.querySelectorAll('.icon-cell').forEach(x=>x.classList.remove('on')); });
  form.appendChild(customIn);

  // Actions
  const acts=document.createElement('div'); acts.className='type-form-actions';
  const cancel=document.createElement('button'); cancel.className='btn-sm ghost'; cancel.textContent='Cancel';
  cancel.addEventListener('click',()=>{ tpEditId=null; tpShowCreate=false; renderTypesPanel(); });

  const save=document.createElement('button'); save.className='btn-sm primary'; save.textContent=isCreate?'Create':'Update';
  save.addEventListener('click',()=>{
    if (isCreate) {
      const name=(nameInput?.value||'').trim(); if(!name){nameInput?.focus();return;}
      db.customTypes.push({id:'custom-'+uid(),name,color:localColor,icon:localIcon});
      tpShowCreate=false;
    } else {
      if (isBuiltIn(editType.id)) {
        if (!db.typeOverrides) db.typeOverrides={};
        db.typeOverrides[editType.id]={ color:localColor, icon:localIcon };
      } else {
        const ct=db.customTypes.find(c=>c.id===editType.id);
        if (ct) { ct.color=localColor; ct.icon=localIcon; }
      }
      tpEditId=null;
    }
    dbSave(); renderLegend(); renderTypesPanel(); renderCalendar();
  });
  acts.appendChild(cancel); acts.appendChild(save);
  form.appendChild(acts);
  return form;
}

document.getElementById('btn-add-type-row').addEventListener('click',()=>{ tpShowCreate=!tpShowCreate; tpEditId=null; tpColor=PRESET_COLORS[5]; tpIcon='вӯҗ'; renderTypesPanel(); });

// в”Җв”Җ Event links в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderEvLinks() {
  const list=document.getElementById('ev-links-list'); list.innerHTML='';
  mLinks.forEach((lk,i)=>{
    const row=document.createElement('div'); row.className='link-row';
    row.innerHTML=`<input type="text" placeholder="Label" value="${esc(lk.label)}" data-i="${i}" data-f="label"><input type="url" placeholder="https://вҖҰ" value="${esc(lk.url)}" data-i="${i}" data-f="url"><button class="btn-rm-link" data-i="${i}">вң•</button>`;
    row.querySelectorAll('input').forEach(inp=>inp.addEventListener('input',ev=>{mLinks[+ev.target.dataset.i][ev.target.dataset.f]=ev.target.value;}));
    row.querySelector('button').addEventListener('click',ev=>{mLinks.splice(+ev.target.dataset.i,1);renderEvLinks();});
    list.appendChild(row);
  });
}
document.getElementById('btn-add-ev-link').addEventListener('click',()=>{mLinks.push({label:'',url:''});renderEvLinks();});

// в”Җв”Җ Options / Alternatives в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function makeOption() { return {id:uid(),name:'',location:'',notes:'',links:[],status:'considering'}; }

function renderEvOptions() {
  const list=document.getElementById('ev-options-list'); list.innerHTML='';
  mOptions.forEach((opt,i)=>{
    const card=document.createElement('div'); card.className='option-card';

    // Header
    const head=document.createElement('div'); head.className='option-card-head';
    const badge=document.createElement('span');
    badge.className=`option-status-badge ${opt.status==='selected'?'selected':'considering'}`;
    badge.textContent=opt.status==='selected'?'вң“ Selected':'в—Ӣ Considering';
    const selBtn=document.createElement('button');
    selBtn.className='btn-select-opt'+(opt.status==='selected'?' is-selected':'');
    selBtn.textContent=opt.status==='selected'?'Selected':'Select';
    selBtn.addEventListener('click',()=>{
      mOptions.forEach(o=>o.status='considering');
      opt.status='selected'; renderEvOptions();
    });
    const rmBtn=document.createElement('button'); rmBtn.className='btn-rm-opt'; rmBtn.title='Remove'; rmBtn.textContent='вң•';
    rmBtn.addEventListener('click',()=>{mOptions.splice(i,1);renderEvOptions();});
    head.appendChild(badge); head.appendChild(selBtn); head.appendChild(rmBtn);

    // Body
    const body=document.createElement('div'); body.className='option-card-body';

    const nameIn=document.createElement('input'); nameIn.type='text'; nameIn.placeholder='Name (e.g. Blue Ridge Trail)'; nameIn.value=opt.name;
    nameIn.addEventListener('input',e=>opt.name=e.target.value);

    const locIn=document.createElement('input'); locIn.type='text'; locIn.placeholder='Location'; locIn.value=opt.location||'';
    locIn.addEventListener('input',e=>opt.location=e.target.value);

    const notesIn=document.createElement('textarea'); notesIn.placeholder='NotesвҖҰ'; notesIn.value=opt.notes||'';
    notesIn.addEventListener('input',e=>opt.notes=e.target.value);

    // Option links
    const linksWrap=document.createElement('div'); linksWrap.className='option-links';
    function renderOptLinks() {
      linksWrap.innerHTML='';
      opt.links.forEach((lk,li)=>{
        const row=document.createElement('div'); row.className='link-row';
        row.innerHTML=`<input type="text" placeholder="Label" value="${esc(lk.label)}" data-i="${li}" data-f="label"><input type="url" placeholder="https://вҖҰ" value="${esc(lk.url)}" data-i="${li}" data-f="url"><button class="btn-rm-link">вң•</button>`;
        row.querySelectorAll('input').forEach(inp=>inp.addEventListener('input',ev=>{opt.links[+ev.target.dataset.i][ev.target.dataset.f]=ev.target.value;}));
        row.querySelector('button').addEventListener('click',()=>{opt.links.splice(li,1);renderOptLinks();});
        linksWrap.appendChild(row);
      });
      const addLinkBtn=document.createElement('button'); addLinkBtn.className='btn-add-link'; addLinkBtn.textContent='+ Add link'; addLinkBtn.style.marginTop='3px';
      addLinkBtn.addEventListener('click',()=>{opt.links.push({label:'',url:''});renderOptLinks();});
      linksWrap.appendChild(addLinkBtn);
    }
    renderOptLinks();

    body.appendChild(nameIn); body.appendChild(locIn); body.appendChild(notesIn); body.appendChild(linksWrap);
    card.appendChild(head); card.appendChild(body); list.appendChild(card);
  });
}

document.getElementById('btn-add-option').addEventListener('click',()=>{mOptions.push(makeOption());renderEvOptions();});
document.getElementById('ev-is-addon').addEventListener('change',e=>mIsAddOn=e.target.checked);

// в”Җв”Җ Save / Delete / Close в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function closeModal() { document.getElementById('event-modal').style.display='none'; }
document.getElementById('btn-cancel-ev').addEventListener('click',closeModal);
document.getElementById('event-modal').addEventListener('click',e=>{if(e.target.id==='event-modal')closeModal();});

document.getElementById('btn-save-ev').addEventListener('click',()=>{
  const title=document.getElementById('ev-title').value.trim(); if(!title){document.getElementById('ev-title').focus();return;}
  const start=document.getElementById('ev-start').value, end=document.getElementById('ev-end').value; if(!start||!end)return;
  const t=activeTrip(); if(!t)return;
  const saveDate = mDate || document.getElementById('ev-date').value;
  if (!saveDate) { document.getElementById('ev-date').focus(); return; }
  mDate = saveDate;
  if (!t.events[mDate]) t.events[mDate]=[];
  const ev={
    id:mId||uid(), type:mType, title, start, end,
    location:document.getElementById('ev-location').value.trim(),
    notes:document.getElementById('ev-notes').value,
    links:mLinks.filter(l=>l.url),
    options:mOptions,
    isAddOn:mIsAddOn,
  };
  if (mMode==='new') t.events[mDate].push(ev);
  else { const idx=t.events[mDate].findIndex(e=>e.id===mId); if(idx!==-1)t.events[mDate][idx]=ev; }
  dbSave(); closeModal(); renderCalendar();
});

document.getElementById('btn-delete-ev').addEventListener('click',()=>{
  if(!confirm('Delete this event?'))return;
  const t=activeTrip();if(!t)return;
  t.events[mDate]=(t.events[mDate]||[]).filter(e=>e.id!==mId);
  dbSave();closeModal();renderCalendar();
});

// в”Җв”Җ File buttons в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
document.getElementById('btn-open-file').addEventListener('click', openFile);
document.getElementById('btn-save-file').addEventListener('click', saveFileAs);

// в”Җв”Җ Boot в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
renderSidebar();
renderTripEditor();
tryRestoreHandle();
</script>
