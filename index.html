</div>

<!-- Packing Modal -->
<div id="packing-modal">
  <div class="pack-modal-inner">
    <div class="pack-modal-head">
      <h2>🧳 Packing List</h2>
      <button type="button" id="btn-close-packing">✕ Close</button>
    </div>
    <div class="pack-summary" id="pack-summary"></div>
    <div class="pack-cats" id="pack-cats"></div>
    <button type="button" class="btn-pack-add-cat" id="btn-pack-add-cat">+ Add Category</button>
  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────────
const LS_KEY    = 'rtp-v3';
const IDB_NAME  = 'rtp-fsh';
const IDB_STORE = 'handles';
const IDB_KEY   = 'tripsFile';

const BUILT_IN = [
  { id: 'Food',     name: 'Food',      color: '#ea6c0a', icon: '🍔' },
  { id: 'Travel',   name: 'Travel',    color: '#2563eb', icon: '🚗' },
  { id: 'Activity', name: 'Activity',  color: '#059669', icon: '🎯' },
  { id: 'Free',     name: 'Free Time', color: '#7c3aed', icon: '😎' },
];

const PRESET_COLORS = [
  '#ef4444','#f97316','#eab308','#22c55e',
  '#06b6d4','#3b82f6','#8b5cf6','#ec4899',
  '#64748b','#1e293b',
];

const EMOJI_SET = [
  '🍔','🍕','🌮','🍜','🥗','🍣','☕','🍺','🍦','🥞',
  '🚗','✈️','🚂','🚢','🏍️','🚴','🚶','🛺','🚁','⛵',
  '🎯','🏖️','🏔️','🎭','🎨','🎵','⛷️','🏄','🎲','📸',
  '😎','💤','🛒','🏥','⛽','🔑','🎁','⭐','💼','🗺️',
];

const PACK_EMOJIS = ['👕','🧴','📦','🐶','👶','💊','📸','⛺','🎒','🚗','🏖️','🎮','💼','🧢','👟','🪥','🔌','📱','🍎','🎵'];

const DEFAULT_PACK_CATS = [
  { emoji:'📦', name:'General', items:[] },
];

const HOURS  = Array.from({ length: 24 }, (_, i) => i);
const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── Storage ────────────────────────────────────────────────────────────────────
let fileHandle = null, fileLinked = false, pendingSave = false;

function lsLoad() { try { const r = localStorage.getItem(LS_KEY); return r ? JSON.parse(r) : null; } catch { return null; } }
function lsSave() { try { localStorage.setItem(LS_KEY, JSON.stringify(db)); } catch {} }

function openIDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}
async function idbSaveHandle(h) { try { const idb = await openIDB(); idb.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).put(h, IDB_KEY); } catch {} }
async function idbLoadHandle() {
  try {
    const idb = await openIDB();
    return await new Promise((res,rej) => { const req = idb.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(IDB_KEY); req.onsuccess=e=>res(e.target.result); req.onerror=e=>rej(e.target.error); });
  } catch { return null; }
}
async function idbClearHandle() { try { const idb = await openIDB(); idb.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).delete(IDB_KEY); } catch {} }
async function readFromHandle(h) { return JSON.parse(await (await h.getFile()).text()); }
async function writeToHandle(h) { const w = await h.createWritable(); await w.write(JSON.stringify(db,null,2)); await w.close(); }

function dbSave() {
  lsSave();
  if (!fileLinked || !fileHandle) return;
  setFileStatus('unsaved');
  if (!pendingSave) {
    pendingSave = true;
    setTimeout(async () => {
      try { await writeToHandle(fileHandle); setFileStatus('saved'); }
      catch { setFileStatus('error'); }
      pendingSave = false;
    }, 400);
  }
}

function setFileStatus(state) {
  const el = document.getElementById('file-status');
  el.onclick = null; el.style.cursor = '';
  const name = fileHandle ? fileHandle.name : '';
  if (state==='none')    { el.className='';        el.textContent='💾 No file linked'; }
  if (state==='linked')  { el.className='linked';  el.textContent=`✅ ${name}`; }
  if (state==='unsaved') { el.className='unsaved'; el.textContent='● Saving…'; }
  if (state==='saved')   { el.className='linked';  el.textContent=`✅ ${name}`; }
  if (state==='error')   { el.className='unsaved'; el.textContent='⚠️ Save failed'; }
}

function applyLoadedData(data) {
  if (!data || typeof data.trips !== 'object') return false;
  db = data;
  if (!db.customTypes)    db.customTypes = [];
  if (!db.typeOverrides)  db.typeOverrides = {};
  if (!db.trips[db.activeId]) db.activeId = Object.keys(db.trips)[0] || null;
  return true;
}

async function openFile() {
  if (!window.showOpenFilePicker) { document.getElementById('file-unsupported').style.display='block'; return; }
  try {
    const [h] = await window.showOpenFilePicker({ types:[{description:'Trip JSON',accept:{'application/json':['.json']}}] });
    applyLoadedData(await readFromHandle(h));
    fileHandle=h; fileLinked=true; await idbSaveHandle(h);
    setFileStatus('linked'); lsSave(); renderSidebar(); renderTripEditor();
  } catch(e) { if (e.name!=='AbortError') alert('Could not open file:\n'+e.message); }
}

async function saveFileAs() {
  if (!window.showSaveFilePicker) { document.getElementById('file-unsupported').style.display='block'; return; }
  try {
    const h = await window.showSaveFilePicker({ suggestedName:'trips.json', types:[{description:'Trip JSON',accept:{'application/json':['.json']}}] });
    await writeToHandle(h); fileHandle=h; fileLinked=true; await idbSaveHandle(h); setFileStatus('linked');
  } catch(e) { if (e.name!=='AbortError') alert('Could not save:\n'+e.message); }
}

async function tryRestoreHandle() {
  if (!window.showOpenFilePicker) { document.getElementById('file-unsupported').style.display='block'; return; }
  const h = await idbLoadHandle(); if (!h) return;
  try {
    const perm = await h.queryPermission({ mode:'readwrite' });
    if (perm==='granted') {
      applyLoadedData(await readFromHandle(h));
      fileHandle=h; fileLinked=true; setFileStatus('linked'); lsSave(); renderSidebar(); renderTripEditor(); return;
    }
    if (perm==='prompt') {
      const el = document.getElementById('file-status');
      el.className='unsaved'; el.textContent=`🔗 Click to reload ${h.name}`; el.style.cursor='pointer';
      el.onclick = async () => {
        el.onclick=null; el.style.cursor='';
        try {
          if (await h.requestPermission({mode:'readwrite'})==='granted') {
            applyLoadedData(await readFromHandle(h));
            fileHandle=h; fileLinked=true; setFileStatus('linked'); lsSave(); renderSidebar(); renderTripEditor();
          }
        } catch {}
      };
    }
  } catch { await idbClearHandle(); }
}

// ── DB init ────────────────────────────────────────────────────────────────────
function makeTrip(id) { return { id, name:'', start:'', end:'', links:[], events:{} }; }

let db = lsLoad();
if (!db || typeof db.trips !== 'object') {
  const id = uid();
  db = { activeId:id, trips:{ [id]: makeTrip(id) }, customTypes:[], typeOverrides:{} };
} else {
  if (!db.customTypes)   db.customTypes = [];
  if (!db.typeOverrides) db.typeOverrides = {};
}
if (!db.trips[db.activeId]) db.activeId = Object.keys(db.trips)[0] || null;

function activeTrip() { return db.trips[db.activeId] || null; }

// Types: built-in with optional overrides + custom
function allTypes() {
  const ov = db.typeOverrides || {};
  return [
    ...BUILT_IN.map(t => ov[t.id] ? { ...t, ...ov[t.id] } : t),
    ...db.customTypes,
  ];
}
function getType(id) { return allTypes().find(t => t.id === id) || allTypes()[0]; }
function isBuiltIn(id) { return BUILT_IN.some(t => t.id === id); }

// ── Helpers ────────────────────────────────────────────────────────────────────
function uid() { return 't' + Date.now() + Math.random().toString(36).slice(2,6); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toMin(t) { const [h,m]=t.split(':').map(Number); return h*60+m; }
function fmtDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function datesInRange(s,e) { const l=[],c=new Date(s+'T00:00:00'),last=new Date(e+'T00:00:00'); while(c<=last){l.push(fmtDate(c));c.setDate(c.getDate()+1);} return l; }
function fmtDateLabel(iso) { return new Date(iso+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function tripDateLabel(t) {
  if (!t.start&&!t.end) return 'No dates set';
  if (t.start&&t.end) return `${fmtDateLabel(t.start)} – ${fmtDateLabel(t.end)}`;
  return t.start?`From ${fmtDateLabel(t.start)}`:`Until ${fmtDateLabel(t.end)}`;
}

// ── Sidebar ────────────────────────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('trips-list');
  const trips = Object.values(db.trips).sort((a,b) => b.id>a.id?1:-1);
  list.innerHTML = '';
  if (!trips.length) { list.innerHTML='<div class="sidebar-empty">No trips yet</div>'; return; }
  trips.forEach(t => {
    const el = document.createElement('div');
    el.className = 'trip-item'+(t.id===db.activeId?' active':'');
    el.innerHTML = `<div class="trip-item-name">${esc(t.name||'Untitled Trip')}</div><div class="trip-item-dates">${tripDateLabel(t)}</div><button class="trip-item-delete" title="Delete">✕</button>`;
    el.addEventListener('click', e => { if(e.target.closest('.trip-item-delete')) return; db.activeId=t.id; dbSave(); renderSidebar(); renderTripEditor(); });
    el.querySelector('.trip-item-delete').addEventListener('click', e => {
      e.stopPropagation();
      if (!confirm(`Delete "${t.name||'Untitled Trip'}"?`)) return;
      delete db.trips[t.id];
      if (db.activeId===t.id) { const rem=Object.keys(db.trips); if(!rem.length){const nid=uid();db.trips[nid]=makeTrip(nid);db.activeId=nid;}else db.activeId=rem[0]; }
      dbSave(); renderSidebar(); renderTripEditor();
    });
    list.appendChild(el);
  });
}

function renderLegend() {
  const lg = document.getElementById('legend');
  lg.innerHTML = '';
  allTypes().forEach(t => {
    const d = document.createElement('div'); d.className='leg';
    d.innerHTML = `<div class="leg-dot" style="background:${t.color}"></div>${esc(t.name)}`;
    lg.appendChild(d);
  });
  const btn = document.createElement('button');
  btn.id='btn-manage-types'; btn.title='Manage event types'; btn.textContent='⚙';
  btn.addEventListener('click', () => { document.getElementById('types-panel').classList.toggle('open'); renderTypesPanel(); });
  lg.appendChild(btn);
}

function renderTripEditor() {
  const t = activeTrip();
  const editor = document.getElementById('trip-editor');
  const noTrip = document.getElementById('no-trip-state');
  if (!t) { editor.style.display='none'; noTrip.style.display='flex'; return; }
  noTrip.style.display='none'; editor.style.display='flex'; editor.style.flexDirection='column'; editor.style.flex='1';
  document.getElementById('trip-name-input').value = t.name||'';
  document.getElementById('start-date').value = t.start||'';
  document.getElementById('end-date').value = t.end||'';
  document.title = t.name?`${t.name} — Road Trip`:'Road Trip Planner';
  document.getElementById('trip-links-panel').classList.remove('open');
  document.getElementById('packing-modal').classList.remove('open');
  document.getElementById('types-panel').classList.remove('open');
  document.getElementById('cal-wrapper').style.display = '';
  document.getElementById('no-dates-state').style.display = '';
  document.getElementById('legend').style.display = '';
  tpEditId=null; tpShowCreate=false; packEmojiOpenId=null;
  currentView = 'cal';
  document.getElementById('itinerary-view').style.display = 'none';
  document.getElementById('btn-export-excel').style.display = 'none';
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === 'cal'));
  renderLegend(); renderTripLinks(); renderCalendar();
}

// ── Top bar ────────────────────────────────────────────────────────────────────
document.getElementById('trip-name-input').addEventListener('input', e => { const t=activeTrip();if(!t)return;t.name=e.target.value;document.title=t.name?`${t.name} — Road Trip`:'Road Trip Planner';dbSave();renderSidebar(); });
document.getElementById('start-date').addEventListener('change', e => { const t=activeTrip();if(!t)return;t.start=e.target.value;dbSave();renderSidebar();renderCalendar(); });
document.getElementById('end-date').addEventListener('change', e => { const t=activeTrip();if(!t)return;t.end=e.target.value;dbSave();renderSidebar();renderCalendar(); });
document.getElementById('btn-new-trip').addEventListener('click', () => { const id=uid();db.trips[id]=makeTrip(id);db.activeId=id;dbSave();renderSidebar();renderTripEditor();setTimeout(()=>document.getElementById('trip-name-input').focus(),50); });

// ── Trip links ─────────────────────────────────────────────────────────────────
document.getElementById('btn-trip-links').addEventListener('click', () => document.getElementById('trip-links-panel').classList.toggle('open'));
document.getElementById('btn-add-trip-link').addEventListener('click', () => { const t=activeTrip();if(!t)return;t.links.push({label:'',url:''});dbSave();renderTripLinks(); });
function renderTripLinks() {
  const t=activeTrip(), editor=document.getElementById('trip-links-editor'), chips=document.getElementById('trip-links-chips');
  editor.innerHTML=''; chips.innerHTML=''; if(!t)return;
  t.links.forEach((lk,i) => {
    const row=document.createElement('div'); row.className='link-row';
    row.innerHTML=`<input type="text" placeholder="Label" value="${esc(lk.label)}" data-i="${i}" data-f="label"><input type="url" placeholder="https://…" value="${esc(lk.url)}" data-i="${i}" data-f="url"><button class="btn-rm-link" data-i="${i}">✕</button>`;
    row.querySelectorAll('input').forEach(inp=>inp.addEventListener('input',ev=>{t.links[+ev.target.dataset.i][ev.target.dataset.f]=ev.target.value;dbSave();renderTripLinksChips();}));
    row.querySelector('button').addEventListener('click',ev=>{t.links.splice(+ev.target.dataset.i,1);dbSave();renderTripLinks();});
    editor.appendChild(row);
  });
  renderTripLinksChips();
}
function renderTripLinksChips() {
  const t=activeTrip(), chips=document.getElementById('trip-links-chips'); chips.innerHTML=''; if(!t)return;
  t.links.filter(l=>l.url).forEach(l=>{const a=document.createElement('a');a.href=l.url;a.target='_blank';a.rel='noopener noreferrer';a.textContent=l.label||l.url;chips.appendChild(a);});
}

// ── Calendar ───────────────────────────────────────────────────────────────────
function renderCalendar() {
  const t=activeTrip(), noDates=document.getElementById('no-dates-state'), wrapper=document.getElementById('cal-wrapper'), cal=document.getElementById('cal');
  if (!t||!t.start||!t.end||t.start>t.end) { noDates.style.display='flex'; wrapper.style.display='none'; return; }
  noDates.style.display='none'; wrapper.style.display='block';
  const dates=datesInRange(t.start,t.end); cal.innerHTML='';
  const gutter=document.createElement('div'); gutter.className='time-col';
  HOURS.forEach(h=>{const tick=document.createElement('div');tick.className='time-tick';tick.textContent=h===0?'12am':h<12?`${h}am`:h===12?'12pm':`${h-12}pm`;gutter.appendChild(tick);});
  cal.appendChild(gutter);
  dates.forEach(iso=>{
    const d=new Date(iso+'T00:00:00'), col=document.createElement('div'); col.className='day-col'; col.dataset.iso=iso;
    const head=document.createElement('div'); head.className='day-head';
    head.innerHTML=`<span class="dn">${d.getDate()}</span>${DAYS[d.getDay()]} ${MONTHS[d.getMonth()]}`;
    col.appendChild(head);
    HOURS.forEach(h=>{const slot=document.createElement('div');slot.className='hour-slot';slot.addEventListener('click',()=>openEventModal(iso,h));col.appendChild(slot);});
    (t.events[iso]||[]).forEach(ev=>placeEvent(col,ev,iso));
    cal.appendChild(col);
  });
}

function placeEvent(col, ev, iso) {
  const top=48+(toMin(ev.start)/60)*60;
  const height=Math.max(((toMin(ev.end)-toMin(ev.start))/60)*60,22);
  const type=getType(ev.type);
  const el=document.createElement('div');
  el.className='ev'+(ev.isAddOn?' addon':'');
  el.style.top=top+'px'; el.style.height=height+'px'; el.style.background=type.color;

  const opts = ev.options||[];
  const sel  = opts.find(o=>o.status==='selected');
  const sub  = sel ? sel.name : (ev.location||'');
  const optsBadge = opts.length ? `<div class="e-opts">${ev.isAddOn?'⊕ add-on · ':''}${opts.length} option${opts.length!==1?'s':''}</div>` : (ev.isAddOn?'<div class="e-opts">⊕ add-on</div>':'');
  el.innerHTML=`<div class="et">${type.icon} ${esc(ev.title)}</div><div class="eT">${ev.start}–${ev.end}${sub?' · '+esc(sub):''}</div>${optsBadge}`;

  // Resize handle (drag bottom edge to change end time)
  const rh=document.createElement('div'); rh.className='ev-resize-handle';
  rh.addEventListener('mousedown', e=>{ e.stopPropagation(); e.preventDefault(); startEvResize(e,ev,iso,el); });
  el.appendChild(rh);

  // Drag to move; click to open modal
  el.addEventListener('mousedown', e=>{ if(e.button!==0||e.target===rh)return; e.stopPropagation(); startEvDrag(e,ev,iso,el); });
  el.addEventListener('click', e=>{ if(justDragged)return; e.stopPropagation(); openEventModal(iso,null,ev); });

  col.appendChild(el);
}

// ── View toggle ───────────────────────────────────────────────────────────────
let currentView = 'cal';

function setView(v) {
  currentView = v;
  const calWrap = document.getElementById('cal-wrapper');
  const itinWrap = document.getElementById('itinerary-view');
  const exportBtn = document.getElementById('btn-export-excel');
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === v));
  if (exportBtn) exportBtn.style.display = v === 'itin' ? 'flex' : 'none';
  if (v === 'cal') {
    itinWrap.style.display = 'none';
    renderCalendar();
  } else {
    calWrap.style.display = 'none';
    document.getElementById('no-dates-state').style.display = 'none';
    itinWrap.style.display = 'block';
    renderItinerary();
  }
}

function renderItinerary() {
  const t = activeTrip();
  const view = document.getElementById('itinerary-view');
  if (!t || !t.start || !t.end || t.start > t.end) {
    view.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted);font-size:.9rem">Enter start and end dates to see your itinerary.</div>';
    return;
  }
  const dates = datesInRange(t.start, t.end);
  let allRows = [];
  dates.forEach(iso => {
    const evs = (t.events[iso] || []).slice().sort((a, b) => a.start.localeCompare(b.start));
    evs.forEach(ev => allRows.push({ iso, ev }));
  });
  if (!allRows.length) {
    view.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted);font-size:.9rem">No events yet — add events in Calendar view.</div>';
    return;
  }

  const INPUT_CSS = 'background:var(--surface2);border:1px solid var(--accent);border-radius:4px;color:var(--text);font-family:inherit;';

  function editCell(td, render, activate) {
    render();
    td.classList.add('itin-editable');
    td.addEventListener('click', e => {
      e.stopPropagation();
      if (td.querySelector('input,textarea,select')) return;
      activate();
    });
  }

  const table = document.createElement('table');
  table.className = 'itin-table';
  table.innerHTML = `<thead><tr><th></th><th>Time</th><th>Type</th><th>Activity</th><th>Location</th><th>Options</th><th>Notes</th></tr></thead>`;
  const tbody = document.createElement('tbody');
  let lastIso = null;

  allRows.forEach(({ iso, ev }) => {
    if (iso !== lastIso) {
      const d = new Date(iso + 'T00:00:00');
      const sep = document.createElement('tr');
      sep.className = 'itin-day-head';
      sep.innerHTML = `<td colspan="7">${DAYS[d.getDay()].toUpperCase()}, ${MONTHS[d.getMonth()].toUpperCase()} ${d.getDate()}</td>`;
      tbody.appendChild(sep);
      lastIso = iso;
    }

    const tr = document.createElement('tr');

    // ── Edit button ──
    const tdDate = document.createElement('td');
    tdDate.className = 'itin-edit-cell';
    const editBtn = document.createElement('button');
    editBtn.className = 'itin-edit-btn'; editBtn.title = 'Edit event'; editBtn.textContent = '✏️';
    editBtn.addEventListener('click', e => { e.stopPropagation(); openEventModal(iso, null, ev); });
    tdDate.appendChild(editBtn);
    tr.addEventListener('click', () => openEventModal(iso, null, ev));

    // ── Time ──
    const tdTime = document.createElement('td');
    editCell(tdTime, () => {
      tdTime.innerHTML = `<span style="white-space:nowrap;font-size:.8rem;color:var(--muted)">${ev.start}–${ev.end}</span>`;
    }, () => {
      tdTime.innerHTML = '';
      const sIn = document.createElement('input'); sIn.type='time'; sIn.value=ev.start;
      sIn.style.cssText = INPUT_CSS + 'width:88px;font-size:.78rem;padding:2px 4px;';
      const dash = document.createTextNode(' – ');
      const eIn = document.createElement('input'); eIn.type='time'; eIn.value=ev.end;
      eIn.style.cssText = sIn.style.cssText;
      const save = () => { if(sIn.value) ev.start=sIn.value; if(eIn.value) ev.end=eIn.value; dbSave(); editCell(tdTime, ()=>{ tdTime.innerHTML=`<span style="white-space:nowrap;font-size:.8rem;color:var(--muted)">${ev.start}–${ev.end}</span>`; }, ()=>{}); };
      sIn.addEventListener('change', save); eIn.addEventListener('change', save);
      sIn.addEventListener('keydown', k => { if(k.key==='Tab'||k.key==='Enter') eIn.focus(); if(k.key==='Escape') { ev.start=sIn.defaultValue; renderItinerary(); } });
      eIn.addEventListener('keydown', k => { if(k.key==='Escape') renderItinerary(); });
      tdTime.appendChild(sIn); tdTime.appendChild(dash); tdTime.appendChild(eIn);
      sIn.focus();
    });

    // ── Type ──
    const tdType = document.createElement('td');
    const renderTypeCell = () => {
      tdType.innerHTML = '';
      const tp = getType(ev.type);
      const chip = document.createElement('span'); chip.className='itin-type-chip'; chip.style.background=tp.color;
      chip.textContent = `${tp.icon} ${tp.name}`; tdType.appendChild(chip);
      if (ev.isAddOn) { const a=document.createElement('div'); a.className='itin-addon'; a.textContent='⊕ add-on'; tdType.appendChild(a); }
    };
    editCell(tdType, renderTypeCell, () => {
      tdType.innerHTML = '';
      const sel = document.createElement('select');
      sel.style.cssText = INPUT_CSS + 'font-size:.78rem;padding:3px 6px;cursor:pointer;';
      allTypes().forEach(tp => {
        const opt=document.createElement('option'); opt.value=tp.id; opt.textContent=`${tp.icon} ${tp.name}`;
        if (tp.id===ev.type) opt.selected=true; sel.appendChild(opt);
      });
      const save = () => { ev.type=sel.value; dbSave(); renderTypeCell(); };
      sel.addEventListener('change', save);
      sel.addEventListener('blur', renderTypeCell);
      sel.addEventListener('keydown', k => { if(k.key==='Escape') renderTypeCell(); });
      tdType.appendChild(sel); sel.focus();
    });

    // ── Activity (title) ──
    const tdTitle = document.createElement('td');
    const renderTitleCell = () => { tdTitle.innerHTML=`<strong>${esc(ev.title)}</strong>`; };
    editCell(tdTitle, renderTitleCell, () => {
      tdTitle.innerHTML = '';
      const inp = document.createElement('input'); inp.type='text'; inp.value=ev.title;
      inp.style.cssText = INPUT_CSS + 'width:100%;min-width:130px;font-size:.84rem;font-weight:600;padding:3px 6px;';
      const save = () => { const v=inp.value.trim(); if(v){ev.title=v;dbSave();} renderTitleCell(); };
      inp.addEventListener('blur', save);
      inp.addEventListener('keydown', k => { if(k.key==='Enter'){k.preventDefault();save();} if(k.key==='Escape') renderTitleCell(); });
      tdTitle.appendChild(inp); inp.focus(); inp.select();
    });

    // ── Location ──
    const tdLoc = document.createElement('td');
    tdLoc.style.cssText = 'color:var(--muted);font-size:.82rem;';
    const renderLocCell = () => {
      tdLoc.innerHTML = '';
      if (ev.location) { tdLoc.textContent = ev.location; }
      else { const ph=document.createElement('span'); ph.style.color='var(--border)'; ph.textContent='—'; tdLoc.appendChild(ph); }
    };
    editCell(tdLoc, renderLocCell, () => {
      tdLoc.innerHTML = '';
      const inp = document.createElement('input'); inp.type='text'; inp.value=ev.location||''; inp.placeholder='Location…';
      inp.style.cssText = INPUT_CSS + 'width:100%;font-size:.82rem;padding:3px 6px;';
      const save = () => { ev.location=inp.value.trim(); dbSave(); renderLocCell(); };
      inp.addEventListener('blur', save);
      inp.addEventListener('keydown', k => { if(k.key==='Enter'){k.preventDefault();save();} if(k.key==='Escape') renderLocCell(); });
      tdLoc.appendChild(inp); inp.focus(); inp.select();
    });

    // ── Options ──
    const tdOpts = document.createElement('td');
    const opts = ev.options || [], selOpt = opts.find(o => o.status === 'selected');
    if (!opts.length) {
      const ph = document.createElement('span'); ph.style.color='var(--border)'; ph.textContent='—'; tdOpts.appendChild(ph);
    } else if (selOpt) {
      const badge = document.createElement('span'); badge.className='itin-opts-badge itin-opts-sel';
      badge.textContent = `✓ ${selOpt.name}`; tdOpts.appendChild(badge);
    } else {
      const badge = document.createElement('span'); badge.className='itin-opts-badge itin-opts-pending';
      badge.textContent = `● ${opts.length} option${opts.length!==1?'s':''}`;
      tdOpts.appendChild(badge);
    }
    tdOpts.style.cursor = 'pointer';
    tdOpts.addEventListener('click', e => { e.stopPropagation(); openEventModal(iso, null, ev); });

    // ── Notes ──
    const tdNotes = document.createElement('td');
    tdNotes.className = 'itin-notes-cell';
    const renderNotesCell = () => {
      tdNotes.innerHTML = '';
      if (ev.notes) { tdNotes.textContent=ev.notes; }
      else { const ph=document.createElement('span'); ph.style.color='var(--border)'; ph.textContent='—'; tdNotes.appendChild(ph); }
    };
    editCell(tdNotes, renderNotesCell, () => {
      tdNotes.innerHTML = '';
      const ta = document.createElement('textarea'); ta.value=ev.notes||''; ta.placeholder='Notes…'; ta.rows=2;
      ta.style.cssText = INPUT_CSS + 'width:100%;min-width:160px;font-size:.78rem;padding:3px 6px;resize:vertical;';
      const save = () => { ev.notes=ta.value.trim(); dbSave(); renderNotesCell(); };
      ta.addEventListener('blur', save);
      ta.addEventListener('keydown', k => { if(k.key==='Escape') save(); });
      tdNotes.appendChild(ta); ta.focus(); ta.select();
    });

    tr.appendChild(tdDate); tr.appendChild(tdTime); tr.appendChild(tdType);
    tr.appendChild(tdTitle); tr.appendChild(tdLoc); tr.appendChild(tdOpts); tr.appendChild(tdNotes);
    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  view.innerHTML = '';
  view.appendChild(table);
}

// ── Drag & resize ─────────────────────────────────────────────────────────────
let dragState=null, resizeState=null, justDragged=false;

function minToTime(m) {
  m=Math.max(0,Math.min(24*60-1,m));
  return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
}

function startEvDrag(e, ev, iso, el) {
  const r=el.getBoundingClientRect();
  dragState={ ev, iso, el, offsetY:e.clientY-r.top, offsetX:e.clientX-r.left, startX:e.clientX, startY:e.clientY, moved:false, ghost:null };
  document.addEventListener('mousemove', onEvDragMove);
  document.addEventListener('mouseup', onEvDragEnd);
}

function onEvDragMove(e) {
  if(!dragState) return;
  if(!dragState.moved && (Math.abs(e.clientX-dragState.startX)>4||Math.abs(e.clientY-dragState.startY)>4)) {
    dragState.moved=true;
    dragState.el.classList.add('ev-dragging');
    const r=dragState.el.getBoundingClientRect(), type=getType(dragState.ev.type);
    const g=document.createElement('div'); g.className='ev-ghost';
    g.style.cssText=`width:${r.width}px;height:${r.height}px;background:${type.color};top:${r.top}px;left:${r.left}px;`;
    g.innerHTML=dragState.el.innerHTML;
    document.body.appendChild(g); dragState.ghost=g;
  }
  if(dragState.moved && dragState.ghost) {
    dragState.ghost.style.top=(e.clientY-dragState.offsetY)+'px';
    dragState.ghost.style.left=(e.clientX-dragState.offsetX)+'px';
  }
  document.querySelectorAll('.day-col.drag-over').forEach(c=>c.classList.remove('drag-over'));
  const col=document.elementFromPoint(e.clientX,e.clientY)?.closest('.day-col');
  if(col) col.classList.add('drag-over');
}

function onEvDragEnd(e) {
  document.removeEventListener('mousemove', onEvDragMove);
  document.removeEventListener('mouseup', onEvDragEnd);
  document.querySelectorAll('.day-col.drag-over').forEach(c=>c.classList.remove('drag-over'));
  if(!dragState) return;
  dragState.el.classList.remove('ev-dragging');
  if(dragState.ghost) dragState.ghost.remove();

  if(dragState.moved) {
    justDragged=true;
    const targetCol=document.elementFromPoint(e.clientX,e.clientY)?.closest('.day-col');
    const targetIso=targetCol?.dataset?.iso;
    if(targetCol && targetIso) {
      const colRect=targetCol.getBoundingClientRect();
      let startMin=Math.round((e.clientY-colRect.top-dragState.offsetY-48)/15)*15;
      startMin=Math.max(0,Math.min(23*60,startMin));
      const dur=toMin(dragState.ev.end)-toMin(dragState.ev.start);
      let endMin=startMin+dur;
      if(endMin>24*60){endMin=24*60;startMin=endMin-dur;}
      const t=activeTrip();
      if(t){
        const oldArr=t.events[dragState.iso]||[];
        const idx=oldArr.findIndex(ev=>ev.id===dragState.ev.id);
        if(idx!==-1){
          const [moved]=oldArr.splice(idx,1);
          moved.start=minToTime(startMin); moved.end=minToTime(endMin);
          if(!t.events[targetIso]) t.events[targetIso]=[];
          t.events[targetIso].push(moved);
          dbSave(); renderCalendar();
        }
      }
    }
    setTimeout(()=>{ justDragged=false; },50);
  }
  dragState=null;
}

function startEvResize(e, ev, iso, el) {
  resizeState={ ev, iso, el, startY:e.clientY, origEndMin:toMin(ev.end), startMin:toMin(ev.start) };
  document.addEventListener('mousemove', onEvResizeMove);
  document.addEventListener('mouseup', onEvResizeEnd);
}

function onEvResizeMove(e) {
  if(!resizeState) return;
  const deltaMin=Math.round((e.clientY-resizeState.startY)/15)*15;
  const newEnd=Math.max(resizeState.startMin+15, Math.min(24*60, resizeState.origEndMin+deltaMin));
  resizeState.el.style.height=Math.max(22,newEnd-resizeState.startMin)+'px';
  const tLabel=resizeState.el.querySelector('.eT');
  if(tLabel) tLabel.textContent=`${resizeState.ev.start}–${minToTime(newEnd)}`;
}

function onEvResizeEnd(e) {
  document.removeEventListener('mousemove', onEvResizeMove);
  document.removeEventListener('mouseup', onEvResizeEnd);
  if(!resizeState) return;
  const deltaMin=Math.round((e.clientY-resizeState.startY)/15)*15;
  const newEnd=Math.max(resizeState.startMin+15, Math.min(24*60, resizeState.origEndMin+deltaMin));
  const t=activeTrip();
  if(t){
    const arr=t.events[resizeState.iso]||[];
    const target=arr.find(ev=>ev.id===resizeState.ev.id);
    if(target){ target.end=minToTime(newEnd); dbSave(); renderCalendar(); }
  }
  resizeState=null;
}

// ── Modal state ────────────────────────────────────────────────────────────────
let mMode='new', mDate=null, mId=null, mType='Food', mLinks=[], mOptions=[], mIsAddOn=false;

function openEventModal(iso, hour, ev) {
  mDate=iso;
  const dateField = document.getElementById('ev-date-field');
  const dateInput = document.getElementById('ev-date');

  if (ev) {
    mMode='edit'; mId=ev.id; mType=ev.type;
    mLinks=JSON.parse(JSON.stringify(ev.links||[]));
    mOptions=JSON.parse(JSON.stringify(ev.options||[]));
    mIsAddOn=!!ev.isAddOn;
    document.getElementById('modal-heading').textContent='Edit Event';
    document.getElementById('ev-title').value=ev.title;
    document.getElementById('ev-start').value=ev.start;
    document.getElementById('ev-end').value=ev.end;
    document.getElementById('ev-location').value=ev.location||'';
    document.getElementById('ev-notes').value=ev.notes||'';
    document.getElementById('btn-delete-ev').style.display='block';
    dateField.style.display='none';
  } else {
    mMode='new'; mId=null; mType='Food'; mLinks=[]; mOptions=[]; mIsAddOn=false;
    document.getElementById('modal-heading').textContent='Add Event';
    document.getElementById('ev-title').value='';
    document.getElementById('ev-location').value='';
    document.getElementById('ev-notes').value='';
    document.getElementById('btn-delete-ev').style.display='none';
    if (iso) {
      // Opened from a time slot click — date is known, hour is set
      dateField.style.display='none';
      document.getElementById('ev-start').value=`${String(hour).padStart(2,'0')}:00`;
      document.getElementById('ev-end').value=`${String(Math.min(hour+1,23)).padStart(2,'0')}:00`;
    } else {
      // Opened from the legend "Add Event" button — let user pick date
      const t=activeTrip();
      dateInput.value = t&&t.start ? t.start : '';
      dateInput.min = t&&t.start ? t.start : '';
      dateInput.max = t&&t.end   ? t.end   : '';
      dateField.style.display='flex';
      document.getElementById('ev-start').value='09:00';
      document.getElementById('ev-end').value='10:00';
    }
  }
  document.getElementById('ev-is-addon').checked=mIsAddOn;
  renderTypePills(); renderEvLinks(); renderEvOptions();
  document.getElementById('event-modal').style.display='flex';
  setTimeout(()=>document.getElementById('ev-title').focus(),50);
}

// ── Type pills (modal: selection only) ────────────────────────────────────────
function renderTypePills() {
  const wrap=document.getElementById('type-pills'); wrap.innerHTML='';
  allTypes().forEach(t=>{
    const pill=document.createElement('div');
    pill.className='pill'+(mType===t.id?' on':'');
    pill.style.background=t.color; pill.style.borderColor=t.color;
    pill.textContent=`${t.icon} ${t.name}`;
    pill.addEventListener('click',()=>{ mType=t.id; renderTypePills(); });
    wrap.appendChild(pill);
  });
}

// ── Types panel (outside modal) ────────────────────────────────────────────────
let tpEditId=null, tpColor=PRESET_COLORS[5], tpIcon='⭐', tpShowCreate=false;

function renderTypesPanel() {
  const listEl=document.getElementById('types-list');
  const createEl=document.getElementById('types-create-form');
  listEl.innerHTML=''; createEl.innerHTML='';

  allTypes().forEach(t=>{
    const row=document.createElement('div'); row.className='type-row';
    row.innerHTML=`<div class="type-row-icon">${t.icon}</div><div class="type-row-dot" style="background:${t.color}"></div><div class="type-row-name">${esc(t.name)}</div>`;
    if (isBuiltIn(t.id)) {
      const tag=document.createElement('span'); tag.className='type-row-tag'; tag.textContent='built-in'; row.appendChild(tag);
    }
    const editBtn=document.createElement('button'); editBtn.className='btn-type-edit'; editBtn.textContent='✏️ Edit';
    editBtn.addEventListener('click',()=>{ tpEditId=tpEditId===t.id?null:t.id; tpColor=t.color; tpIcon=t.icon; tpShowCreate=false; renderTypesPanel(); });
    row.appendChild(editBtn);
    if (!isBuiltIn(t.id)) {
      const delBtn=document.createElement('button'); delBtn.className='btn-type-del'; delBtn.textContent='✕';
      delBtn.addEventListener('click',()=>{
        if (!confirm(`Delete type "${t.name}"?`)) return;
        db.customTypes=db.customTypes.filter(c=>c.id!==t.id);
        if (tpEditId===t.id) tpEditId=null;
        dbSave(); renderLegend(); renderTypesPanel(); renderCalendar();
      });
      row.appendChild(delBtn);
    }
    listEl.appendChild(row);

    // Inline edit form for this type
    if (tpEditId===t.id) {
      listEl.appendChild(buildTypeForm(false, t));
    }
  });

  // Create form
  if (tpShowCreate) {
    createEl.appendChild(buildTypeForm(true, null));
  }
}

function buildTypeForm(isCreate, editType) {
  let localColor = isCreate ? tpColor : editType.color;
  let localIcon  = isCreate ? tpIcon  : editType.icon;

  const form=document.createElement('div'); form.className='type-form';
  let nameInput=null;
  if (isCreate) {
    form.innerHTML='<h4>New Event Type</h4>';
    nameInput=document.createElement('input'); nameInput.type='text'; nameInput.placeholder='Type name…';
    form.appendChild(nameInput);
  } else {
    form.innerHTML=`<h4>Edit "${esc(editType.name)}"</h4>`;
  }

  // Color swatches
  const colorSect=document.createElement('div');
  colorSect.innerHTML='<div style="font-size:.75rem;color:var(--muted);margin-bottom:4px">Color</div>';
  const swatchRow=document.createElement('div'); swatchRow.className='color-swatches';
  PRESET_COLORS.forEach(c=>{
    const s=document.createElement('div'); s.className='swatch'+(localColor===c?' on':''); s.style.background=c;
    s.addEventListener('click',()=>{ localColor=c; swatchRow.querySelectorAll('.swatch').forEach(x=>x.classList.remove('on')); s.classList.add('on'); });
    swatchRow.appendChild(s);
  });
  colorSect.appendChild(swatchRow); form.appendChild(colorSect);

  // Icon grid
  const iconSect=document.createElement('div');
  iconSect.innerHTML='<div style="font-size:.75rem;color:var(--muted);margin-bottom:4px">Icon</div>';
  const grid=document.createElement('div'); grid.className='icon-grid';
  EMOJI_SET.forEach(em=>{
    const cell=document.createElement('div'); cell.className='icon-cell'+(localIcon===em?' on':''); cell.textContent=em;
    cell.addEventListener('click',()=>{ localIcon=em; grid.querySelectorAll('.icon-cell').forEach(x=>x.classList.remove('on')); cell.classList.add('on'); });
    grid.appendChild(cell);
  });
  iconSect.appendChild(grid); form.appendChild(iconSect);

  // Custom emoji input
  const customIn=document.createElement('input'); customIn.type='text'; customIn.placeholder='Or type any emoji'; customIn.maxLength=2;
  customIn.style.cssText='background:var(--surface);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:5px;font-size:.9rem;width:100%;';
  customIn.addEventListener('input',e=>{ const v=e.target.value.trim(); if(!v)return; localIcon=v; grid.querySelectorAll('.icon-cell').forEach(x=>x.classList.remove('on')); });
  form.appendChild(customIn);

  // Actions
  const acts=document.createElement('div'); acts.className='type-form-actions';
  const cancel=document.createElement('button'); cancel.className='btn-sm ghost'; cancel.textContent='Cancel';
  cancel.addEventListener('click',()=>{ tpEditId=null; tpShowCreate=false; renderTypesPanel(); });

  const save=document.createElement('button'); save.className='btn-sm primary'; save.textContent=isCreate?'Create':'Update';
  save.addEventListener('click',()=>{
    if (isCreate) {
      const name=(nameInput?.value||'').trim(); if(!name){nameInput?.focus();return;}
      db.customTypes.push({id:'custom-'+uid(),name,color:localColor,icon:localIcon});
      tpShowCreate=false;
    } else {
      if (isBuiltIn(editType.id)) {
        if (!db.typeOverrides) db.typeOverrides={};
        db.typeOverrides[editType.id]={ color:localColor, icon:localIcon };
      } else {
        const ct=db.customTypes.find(c=>c.id===editType.id);
        if (ct) { ct.color=localColor; ct.icon=localIcon; }
      }
      tpEditId=null;
    }
    dbSave(); renderLegend(); renderTypesPanel(); renderCalendar();
  });
  acts.appendChild(cancel); acts.appendChild(save);
  form.appendChild(acts);
  return form;
}

document.getElementById('btn-add-type-row').addEventListener('click',()=>{ tpShowCreate=!tpShowCreate; tpEditId=null; tpColor=PRESET_COLORS[5]; tpIcon='⭐'; renderTypesPanel(); });

// ── Packing list ───────────────────────────────────────────────────────────────
function initPackingList(t) {
  if (!t.packingList || !t.packingList.length) {
    t.packingList = DEFAULT_PACK_CATS.map(c => ({
      id: uid(), emoji: c.emoji, name: c.name,
      items: c.items.map(name => ({ id: uid(), name, checked: false })),
    }));
  }
}

let packEmojiOpenId = null;

function renderPackingPanel() {
  const t = activeTrip(); if (!t) return;
  initPackingList(t);

  // Summary
  const allItems = t.packingList.flatMap(c => c.items);
  const checkedCount = allItems.filter(i => i.checked).length;
  const summaryEl = document.getElementById('pack-summary');
  if (allItems.length) {
    const pct = Math.round(checkedCount / allItems.length * 100);
    summaryEl.innerHTML = `<strong>${checkedCount}/${allItems.length}</strong> items packed &nbsp;·&nbsp; ${pct}% done`;
  } else {
    summaryEl.textContent = '';
  }

  const catsEl = document.getElementById('pack-cats'); catsEl.innerHTML = '';

  t.packingList.forEach((cat, ci) => {
    const total = cat.items.length, done = cat.items.filter(i => i.checked).length;
    const pct = total ? Math.round(done / total * 100) : 0;

    const card = document.createElement('div'); card.className = 'pack-cat';

    // Header
    const head = document.createElement('div'); head.className = 'pack-cat-head';

    // Emoji button + picker
    const emojiBtn = document.createElement('div'); emojiBtn.className = 'pack-cat-emoji'; emojiBtn.textContent = cat.emoji;
    emojiBtn.addEventListener('click', e => {
      e.stopPropagation();
      packEmojiOpenId = packEmojiOpenId === cat.id ? null : cat.id;
      renderPackingPanel();
    });
    head.appendChild(emojiBtn);

    if (packEmojiOpenId === cat.id) {
      const picker = document.createElement('div'); picker.className = 'pack-emoji-picker';
      PACK_EMOJIS.forEach(em => {
        const opt = document.createElement('div'); opt.className = 'pack-emoji-opt'; opt.textContent = em;
        opt.addEventListener('click', e => { e.stopPropagation(); cat.emoji = em; packEmojiOpenId = null; dbSave(); renderPackingPanel(); });
        picker.appendChild(opt);
      });
      head.appendChild(picker);
    }

    // Name
    const nameIn = document.createElement('input'); nameIn.className = 'pack-cat-name'; nameIn.value = cat.name; nameIn.placeholder = 'Category name…';
    nameIn.addEventListener('input', e => { cat.name = e.target.value; dbSave(); });
    head.appendChild(nameIn);

    // Progress badge
    const badge = document.createElement('span');
    badge.className = 'pack-progress-badge' + (total && done === total ? ' done' : '');
    badge.textContent = total ? (done === total ? '✓ All packed' : `${done}/${total}`) : '0 items';
    head.appendChild(badge);

    // Delete category
    const delBtn = document.createElement('button'); delBtn.className = 'btn-pack-del-cat'; delBtn.title = 'Delete category'; delBtn.textContent = '🗑';
    delBtn.addEventListener('click', () => {
      if (total && !confirm(`Delete "${cat.name}" and its ${total} items?`)) return;
      t.packingList.splice(ci, 1); dbSave(); renderPackingPanel();
    });
    head.appendChild(delBtn);
    card.appendChild(head);

    // Progress bar
    const bar = document.createElement('div'); bar.className = 'pack-progress-bar';
    const fill = document.createElement('div'); fill.className = 'pack-progress-fill'; fill.style.width = pct + '%';
    bar.appendChild(fill); card.appendChild(bar);

    // Items
    const itemsEl = document.createElement('div'); itemsEl.className = 'pack-items';
    cat.items.forEach((item, ii) => {
      const row = document.createElement('div'); row.className = 'pack-item';
      const cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = item.checked;
      cb.addEventListener('change', e => { item.checked = e.target.checked; dbSave(); renderPackingPanel(); });
      const label = document.createElement('span'); label.className = 'pack-item-name' + (item.checked ? ' checked' : ''); label.textContent = item.name;
      const rmBtn = document.createElement('button'); rmBtn.className = 'btn-pack-del-item'; rmBtn.title = 'Remove'; rmBtn.textContent = '✕';
      rmBtn.addEventListener('click', () => { cat.items.splice(ii, 1); dbSave(); renderPackingPanel(); });
      row.appendChild(cb); row.appendChild(label); row.appendChild(rmBtn);
      itemsEl.appendChild(row);
    });
    card.appendChild(itemsEl);

    // Add item row — textarea avoids all browser implicit-form-submit behavior
    const addRow = document.createElement('div'); addRow.className = 'pack-add-item';
    const addIn = document.createElement('textarea'); addIn.className = 'pack-add-in'; addIn.placeholder = 'Add item…'; addIn.rows = 1;
    const addBtn = document.createElement('button'); addBtn.type = 'button'; addBtn.textContent = 'Add';
    const doAdd = () => {
      const name = addIn.value.trim(); if (!name) return;
      const item = { id: uid(), name, checked: false };
      cat.items.push(item);
      dbSave();
      addIn.value = '';
      const row = document.createElement('div'); row.className = 'pack-item';
      const cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = false;
      cb.addEventListener('change', e => { item.checked = e.target.checked; dbSave(); renderPackingPanel(); });
      const lbl = document.createElement('span'); lbl.className = 'pack-item-name'; lbl.textContent = item.name;
      const rmBtn = document.createElement('button'); rmBtn.type = 'button'; rmBtn.className = 'btn-pack-del-item'; rmBtn.title = 'Remove'; rmBtn.textContent = '✕';
      rmBtn.addEventListener('click', () => { cat.items.splice(cat.items.indexOf(item), 1); dbSave(); renderPackingPanel(); });
      row.appendChild(cb); row.appendChild(lbl); row.appendChild(rmBtn);
      itemsEl.appendChild(row);
      const t2 = cat.items.length, d2 = cat.items.filter(i => i.checked).length;
      badge.className = 'pack-progress-badge' + (t2 && d2 === t2 ? ' done' : '');
      badge.textContent = d2 === t2 && t2 > 0 ? '✓ All packed' : `${d2}/${t2}`;
      fill.style.width = (t2 ? Math.round(d2 / t2 * 100) : 0) + '%';
      addIn.focus();
    };
    // mousedown fires before blur — keeps focus in the textarea, no form-submit side effects
    addBtn.addEventListener('mousedown', e => { e.preventDefault(); doAdd(); });
    addIn.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); doAdd(); } });
    addRow.appendChild(addIn); addRow.appendChild(addBtn);
    card.appendChild(addRow);

    catsEl.appendChild(card);
  });
}

document.getElementById('btn-packing-list').addEventListener('click', () => {
  document.getElementById('packing-modal').classList.add('open');
  renderPackingPanel();
});
document.getElementById('btn-close-packing').addEventListener('click', () => {
  document.getElementById('packing-modal').classList.remove('open');
});

document.getElementById('btn-pack-add-cat').addEventListener('click', () => {
  const t = activeTrip(); if (!t) return;
  initPackingList(t);
  t.packingList.push({ id: uid(), emoji: '📦', name: 'New Category', items: [] });
  dbSave(); renderPackingPanel();
});

// close packing picker when clicking elsewhere
document.addEventListener('click', () => { if (packEmojiOpenId) { packEmojiOpenId = null; document.querySelectorAll('.pack-emoji-picker').forEach(p => p.remove()); } });

// ── Event links ────────────────────────────────────────────────────────────────
function renderEvLinks() {
  const list=document.getElementById('ev-links-list'); list.innerHTML='';
  mLinks.forEach((lk,i)=>{
    const row=document.createElement('div'); row.className='link-row';
    row.innerHTML=`<input type="text" placeholder="Label" value="${esc(lk.label)}" data-i="${i}" data-f="label"><input type="url" placeholder="https://…" value="${esc(lk.url)}" data-i="${i}" data-f="url"><button class="btn-rm-link" data-i="${i}">✕</button>`;
    row.querySelectorAll('input').forEach(inp=>inp.addEventListener('input',ev=>{mLinks[+ev.target.dataset.i][ev.target.dataset.f]=ev.target.value;}));
    row.querySelector('button').addEventListener('click',ev=>{mLinks.splice(+ev.target.dataset.i,1);renderEvLinks();});
    list.appendChild(row);
  });
}
document.getElementById('btn-add-ev-link').addEventListener('click',()=>{mLinks.push({label:'',url:''});renderEvLinks();});

// ── Options / Alternatives ─────────────────────────────────────────────────────
function makeOption() { return {id:uid(),name:'',location:'',notes:'',links:[],status:'considering'}; }

function renderEvOptions() {
  const list=document.getElementById('ev-options-list'); list.innerHTML='';
  mOptions.forEach((opt,i)=>{
    const card=document.createElement('div'); card.className='option-card';

    // Header
    const head=document.createElement('div'); head.className='option-card-head';
    const badge=document.createElement('span');
    badge.className=`option-status-badge ${opt.status==='selected'?'selected':'considering'}`;
    badge.textContent=opt.status==='selected'?'✓ Selected':'○ Considering';
    const selBtn=document.createElement('button');
    selBtn.className='btn-select-opt'+(opt.status==='selected'?' is-selected':'');
    selBtn.textContent=opt.status==='selected'?'Selected':'Select';
    selBtn.addEventListener('click',()=>{
      mOptions.forEach(o=>o.status='considering');
      opt.status='selected'; renderEvOptions();
    });
    const rmBtn=document.createElement('button'); rmBtn.className='btn-rm-opt'; rmBtn.title='Remove'; rmBtn.textContent='✕';
    rmBtn.addEventListener('click',()=>{mOptions.splice(i,1);renderEvOptions();});
    head.appendChild(badge); head.appendChild(selBtn); head.appendChild(rmBtn);

    // Body
    const body=document.createElement('div'); body.className='option-card-body';

    const nameIn=document.createElement('input'); nameIn.type='text'; nameIn.placeholder='Name (e.g. Blue Ridge Trail)'; nameIn.value=opt.name;
    nameIn.addEventListener('input',e=>opt.name=e.target.value);

    const locIn=document.createElement('input'); locIn.type='text'; locIn.placeholder='Location'; locIn.value=opt.location||'';
    locIn.addEventListener('input',e=>opt.location=e.target.value);

    const notesIn=document.createElement('textarea'); notesIn.placeholder='Notes…'; notesIn.value=opt.notes||'';
    notesIn.addEventListener('input',e=>opt.notes=e.target.value);

    // Option links
    const linksWrap=document.createElement('div'); linksWrap.className='option-links';
    function renderOptLinks() {
      linksWrap.innerHTML='';
      opt.links.forEach((lk,li)=>{
        const row=document.createElement('div'); row.className='link-row';
        row.innerHTML=`<input type="text" placeholder="Label" value="${esc(lk.label)}" data-i="${li}" data-f="label"><input type="url" placeholder="https://…" value="${esc(lk.url)}" data-i="${li}" data-f="url"><button class="btn-rm-link">✕</button>`;
        row.querySelectorAll('input').forEach(inp=>inp.addEventListener('input',ev=>{opt.links[+ev.target.dataset.i][ev.target.dataset.f]=ev.target.value;}));
        row.querySelector('button').addEventListener('click',()=>{opt.links.splice(li,1);renderOptLinks();});
        linksWrap.appendChild(row);
      });
      const addLinkBtn=document.createElement('button'); addLinkBtn.className='btn-add-link'; addLinkBtn.textContent='+ Add link'; addLinkBtn.style.marginTop='3px';
      addLinkBtn.addEventListener('click',()=>{opt.links.push({label:'',url:''});renderOptLinks();});
      linksWrap.appendChild(addLinkBtn);
    }
    renderOptLinks();

    body.appendChild(nameIn); body.appendChild(locIn); body.appendChild(notesIn); body.appendChild(linksWrap);
    card.appendChild(head); card.appendChild(body); list.appendChild(card);
  });
}

document.getElementById('btn-add-option').addEventListener('click',()=>{mOptions.push(makeOption());renderEvOptions();});
document.getElementById('ev-is-addon').addEventListener('change',e=>mIsAddOn=e.target.checked);

// ── Save / Delete / Close ──────────────────────────────────────────────────────
function closeModal() { document.getElementById('event-modal').style.display='none'; }
document.getElementById('btn-cancel-ev').addEventListener('click',closeModal);
document.getElementById('event-modal').addEventListener('click',e=>{if(e.target.id==='event-modal')closeModal();});

document.getElementById('btn-save-ev').addEventListener('click',()=>{
  const title=document.getElementById('ev-title').value.trim(); if(!title){document.getElementById('ev-title').focus();return;}
  const start=document.getElementById('ev-start').value, end=document.getElementById('ev-end').value; if(!start||!end)return;
  const t=activeTrip(); if(!t)return;
  const saveDate = mDate || document.getElementById('ev-date').value;
  if (!saveDate) { document.getElementById('ev-date').focus(); return; }
  mDate = saveDate;
  if (!t.events[mDate]) t.events[mDate]=[];
  const ev={
    id:mId||uid(), type:mType, title, start, end,
    location:document.getElementById('ev-location').value.trim(),
    notes:document.getElementById('ev-notes').value,
    links:mLinks.filter(l=>l.url),
    options:mOptions,
    isAddOn:mIsAddOn,
  };
  if (mMode==='new') t.events[mDate].push(ev);
  else { const idx=t.events[mDate].findIndex(e=>e.id===mId); if(idx!==-1)t.events[mDate][idx]=ev; }
  dbSave(); closeModal(); currentView === 'itin' ? renderItinerary() : renderCalendar();
});

document.getElementById('btn-delete-ev').addEventListener('click',()=>{
  if(!confirm('Delete this event?'))return;
  const t=activeTrip();if(!t)return;
  t.events[mDate]=(t.events[mDate]||[]).filter(e=>e.id!==mId);
  dbSave(); closeModal(); currentView === 'itin' ? renderItinerary() : renderCalendar();
});

document.getElementById('btn-open-file').addEventListener('click', openFile);
document.getElementById('btn-save-file').addEventListener('click', saveFileAs);

// Prevent any accidental form submission from navigating the page (file:// URL safety)
document.addEventListener('submit', e => e.preventDefault(), true);

document.querySelectorAll('.view-btn').forEach(b => b.addEventListener('click', () => setView(b.dataset.view)));

// ── Excel export ──────────────────────────────────────────────────────────────
function exportItinerary() {
  const t = activeTrip();
  if (!t || !t.start || !t.end) return;
  if (typeof XLSX === 'undefined') { alert('Excel library not loaded — check your internet connection.'); return; }

  const dates = datesInRange(t.start, t.end);
  const rows = [['Date', 'Day', 'Start', 'End', 'Type', 'Activity', 'Location', 'Options', 'Notes']];

  dates.forEach(iso => {
    const evs = (t.events[iso] || []).slice().sort((a, b) => a.start.localeCompare(b.start));
    if (!evs.length) return;
    const d = new Date(iso + 'T00:00:00');
    const dateStr = iso;
    const dayStr = `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}`;
    evs.forEach(ev => {
      const tp = getType(ev.type);
      const opts = ev.options || [], sel = opts.find(o => o.status === 'selected');
      const optStr = sel ? `✓ ${sel.name}` : opts.length ? `${opts.length} option${opts.length !== 1 ? 's' : ''}` : '';
      rows.push([dateStr, dayStr, ev.start, ev.end, `${tp.icon} ${tp.name}`, ev.title, ev.location || '', optStr, ev.notes || '']);
    });
  });

  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [
    { wch: 12 }, { wch: 18 }, { wch: 7 }, { wch: 7 },
    { wch: 14 }, { wch: 32 }, { wch: 26 }, { wch: 24 }, { wch: 44 },
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, (t.name || 'Itinerary').slice(0, 31));
  XLSX.writeFile(wb, `${(t.name || 'itinerary').replace(/[^\w\s-]/g, '')}.xlsx`);
}
