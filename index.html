<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Road Trip Planner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8fafc; --surface: #ffffff; --surface2: #f1f5f9;
      --border: #e2e8f0; --text: #0f172a; --muted: #64748b; --accent: #0284c7;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* в”Җв”Җ Sidebar в”Җв”Җ */
    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: 260px;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; z-index: 10;
    }
    #sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
    #sidebar-header h1 { font-size: 1.1rem; color: var(--accent); margin-bottom: 12px; }
    #btn-new-trip {
      width: 100%; background: var(--accent); color: #fff; border: none;
      padding: 8px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: .88rem;
    }
    #btn-new-trip:hover { opacity: .88; }
    #trips-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
    .trip-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; position: relative; }
    .trip-item:hover { background: var(--surface2); }
    .trip-item.active { background: #e0f2fe; border-color: #7dd3fc; }
    .trip-item-name { font-size: .88rem; font-weight: 600; }
    .trip-item-dates { font-size: .72rem; color: var(--muted); margin-top: 2px; }
    .trip-item-delete {
      position: absolute; top: 8px; right: 8px; background: none; border: none;
      color: var(--muted); cursor: pointer; font-size: .8rem; opacity: 0; padding: 2px 5px; border-radius: 4px;
    }
    .trip-item:hover .trip-item-delete { opacity: 1; }
    .trip-item-delete:hover { color: #ef4444; background: rgba(239,68,68,.1); }
    .sidebar-empty { color: var(--muted); font-size: .82rem; text-align: center; padding: 20px 0; }

    /* в”Җв”Җ File bar в”Җв”Җ */
    #file-bar { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
    #file-status { font-size: .72rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #file-status.linked { color: #16a34a; font-weight: 600; }
    #file-status.unsaved { color: #d97706; }
    .file-btns { display: flex; gap: 5px; }
    .btn-file {
      flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 5px 0; border-radius: 5px; cursor: pointer; font-size: .75rem; text-align: center;
    }
    .btn-file:hover { border-color: var(--accent); color: var(--accent); }
    #file-unsupported { font-size: .7rem; color: #dc2626; padding: 4px 0; display: none; }

    /* в”Җв”Җ Main в”Җв”Җ */
    #main { margin-left: 260px; display: flex; flex-direction: column; min-height: 100vh; }

    /* в”Җв”Җ Top bar в”Җв”Җ */
    #topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .topbar-input {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 7px 11px; border-radius: 6px; font-size: .9rem;
    }
    #trip-name-input { width: 200px; font-size: 1rem; }
    input[type="date"].topbar-input { color-scheme: light; }
    .date-group { display: flex; align-items: center; gap: 6px; }
    .date-group label { color: var(--muted); font-size: .8rem; white-space: nowrap; }
    #btn-trip-links {
      margin-left: auto; background: transparent; border: 1px solid var(--accent);
      color: var(--accent); padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: .82rem;
    }
    #btn-trip-links:hover { background: #e0f2fe; }

    /* в”Җв”Җ Trip links panel в”Җв”Җ */
    #trip-links-panel {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 20px; display: none; flex-direction: column; gap: 10px;
    }
    #trip-links-panel.open { display: flex; }
    #trip-links-panel h3 { font-size: .85rem; color: var(--muted); }
    .links-editor { display: flex; flex-direction: column; gap: 6px; }
    .link-row { display: flex; gap: 6px; }
    .link-row input {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 6px 9px; border-radius: 5px; font-size: .85rem; flex: 1;
    }
    .link-row input:first-child { max-width: 140px; }
    .btn-rm-link {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 5px; cursor: pointer; padding: 4px 8px; font-size: .8rem;
    }
    .btn-rm-link:hover { color: #ef4444; border-color: #ef4444; }
    .btn-add-link {
      background: none; border: 1px dashed var(--border); color: var(--muted);
      border-radius: 6px; padding: 6px; cursor: pointer; font-size: .8rem; text-align: center;
    }
    .btn-add-link:hover { border-color: var(--accent); color: var(--accent); }
    .links-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .links-chips a {
      color: var(--accent); font-size: .8rem; text-decoration: none;
      background: #e0f2fe; padding: 2px 10px; border-radius: 4px; border: 1px solid #7dd3fc;
    }
    .links-chips a:hover { text-decoration: underline; }

    /* в”Җв”Җ Legend в”Җв”Җ */
    #legend {
      display: flex; gap: 14px; padding: 8px 20px; flex-wrap: wrap;
      background: var(--surface); border-bottom: 1px solid var(--border); align-items: center;
    }
    .leg { display: flex; align-items: center; gap: 5px; font-size: .76rem; color: var(--muted); }
    .leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    #legend .hint { margin-left: auto; font-size: .74rem; color: var(--muted); }

    /* в”Җв”Җ Empty states в”Җв”Җ */
    .center-msg {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px; color: var(--muted); padding: 40px;
    }
    .center-msg .icon { font-size: 3rem; }
    .center-msg p { font-size: .95rem; }

    /* в”Җв”Җ Calendar в”Җв”Җ */
    #cal-wrapper { overflow-x: auto; padding: 20px; flex: 1; }
    #cal { display: flex; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; min-width: max-content; }
    .time-col { width: 54px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); padding-top: 48px; }
    .time-tick { height: 60px; display: flex; align-items: flex-start; justify-content: flex-end; padding: 4px 7px 0 0; font-size: .68rem; color: var(--muted); }
    .day-col { flex: 1; min-width: 170px; border-right: 1px solid var(--border); background: var(--bg); position: relative; }
    .day-col:last-child { border-right: none; }
    .day-head {
      height: 48px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: .82rem; position: sticky; top: 0; z-index: 2;
    }
    .day-head .dn { font-size: 1.25rem; color: var(--accent); margin-right: 5px; }
    .hour-slot { height: 60px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
    .hour-slot:hover { background: #f0f9ff; }
    .hour-slot:last-child { border-bottom: none; }
    .ev {
      position: absolute; left: 3px; right: 3px; border-radius: 5px;
      padding: 3px 6px; font-size: .7rem; font-weight: 600; color: #fff;
      cursor: pointer; overflow: hidden; z-index: 1; opacity: .93;
      transition: opacity .12s, transform .12s; display: flex; flex-direction: column; gap: 1px;
    }
    .ev:hover { opacity: 1; transform: scaleX(1.015); }
    .ev .et { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ev .eT { font-weight: 400; opacity: .85; font-size: .63rem; }

    /* в”Җв”Җ Modal в”Җв”Җ */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.4);
      display: flex; align-items: center; justify-content: center; z-index: 50; padding: 20px;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px; width: 100%; max-width: 500px;
      max-height: 92vh; overflow-y: auto; display: flex; flex-direction: column; gap: 14px;
    }
    .modal h2 { font-size: 1.05rem; color: var(--accent); }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: .77rem; color: var(--muted); font-weight: 500; }
    .field input, .field textarea {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 8px 10px; border-radius: 6px; font-size: .88rem; width: 100%; color-scheme: light;
    }
    .field textarea { resize: vertical; min-height: 60px; font-family: inherit; }
    .two-col { display: flex; gap: 10px; }
    .two-col .field { flex: 1; }

    /* в”Җв”Җ Type pills в”Җв”Җ */
    .pills-wrap { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .pill {
      padding: 5px 12px; border-radius: 20px; border: 2px solid transparent;
      cursor: pointer; font-size: .8rem; font-weight: 600; opacity: .4;
      transition: opacity .14s; position: relative; display: flex; align-items: center; gap: 4px;
      color: #fff;
    }
    .pill.on { opacity: 1; }
    .pill-del {
      margin-left: 2px; background: rgba(255,255,255,.3); border: none; border-radius: 50%;
      width: 14px; height: 14px; font-size: .6rem; cursor: pointer; color: #fff;
      display: flex; align-items: center; justify-content: center; line-height: 1;
    }
    .pill-del:hover { background: rgba(255,255,255,.6); }
    .btn-new-type {
      padding: 5px 10px; border-radius: 20px; border: 1px dashed var(--border);
      background: none; color: var(--muted); cursor: pointer; font-size: .78rem;
    }
    .btn-new-type:hover { border-color: var(--accent); color: var(--accent); }

    /* в”Җв”Җ Create-type inline form в”Җв”Җ */
    .type-form {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px; display: flex; flex-direction: column; gap: 10px;
    }
    .type-form h4 { font-size: .82rem; color: var(--muted); font-weight: 600; }
    .type-form input[type="text"] {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      padding: 7px 10px; border-radius: 6px; font-size: .88rem; width: 100%;
    }
    .color-swatches { display: flex; gap: 6px; flex-wrap: wrap; }
    .swatch {
      width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: transform .1s;
    }
    .swatch.on { border-color: var(--text); transform: scale(1.2); }
    .type-form-actions { display: flex; gap: 6px; justify-content: flex-end; }
    .btn-sm {
      padding: 5px 12px; border-radius: 5px; font-size: .8rem; cursor: pointer; font-weight: 600;
    }
    .btn-sm.primary { background: var(--accent); color: #fff; border: none; }
    .btn-sm.primary:hover { opacity: .88; }
    .btn-sm.ghost { background: none; border: 1px solid var(--border); color: var(--muted); }
    .btn-sm.ghost:hover { color: var(--text); }

    /* в”Җв”Җ Icon picker в”Җв”Җ */
    .icon-picker { display: flex; flex-direction: column; gap: 6px; }
    .icon-current {
      display: flex; align-items: center; gap: 8px;
    }
    .icon-preview {
      width: 36px; height: 36px; border-radius: 8px; background: var(--surface2);
      border: 1px solid var(--border); display: flex; align-items: center;
      justify-content: center; font-size: 1.3rem;
    }
    .icon-custom-input {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 6px 9px; border-radius: 6px; font-size: 1rem; width: 70px; text-align: center;
    }
    .icon-grid { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
    .icon-cell {
      width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface2); cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center; transition: background .1s;
    }
    .icon-cell:hover { background: #e0f2fe; }
    .icon-cell.on { background: #bae6fd; border-color: var(--accent); }

    /* в”Җв”Җ Modal actions в”Җв”Җ */
    .modal-links { display: flex; flex-direction: column; gap: 5px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
    .btn-primary {
      background: var(--accent); color: #fff; border: none;
      padding: 8px 20px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: .88rem;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-ghost {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: .88rem;
    }
    .btn-ghost:hover { border-color: var(--text); color: var(--text); }
    .btn-delete {
      background: none; border: 1px solid #ef4444; color: #ef4444;
      padding: 8px 13px; border-radius: 6px; cursor: pointer; font-size: .88rem; margin-right: auto;
    }
    .btn-delete:hover { background: rgba(239,68,68,.1); }

    hr.divider { border: none; border-top: 1px solid var(--border); margin: 0; }
  </style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <h1>рҹҡ— Road Trip Planner</h1>
    <button id="btn-new-trip">+ New Trip</button>
  </div>
  <div id="file-bar">
    <div id="file-status">рҹ’ҫ No file linked</div>
    <div class="file-btns">
      <button class="btn-file" id="btn-open-file">рҹ“Ӯ Open</button>
      <button class="btn-file" id="btn-save-file">рҹ’ҫ Save As</button>
    </div>
    <div id="file-unsupported">вҡ пёҸ Use Chrome or Edge for file support</div>
  </div>
  <div id="trips-list"></div>
</div>

<!-- Main -->
<div id="main">
  <div id="no-trip-state" class="center-msg" style="display:none">
    <div class="icon">рҹ—әпёҸ</div>
    <p>Select a trip or create a new one</p>
  </div>

  <div id="trip-editor" style="display:none">
    <div id="topbar">
      <input id="trip-name-input" class="topbar-input" type="text" placeholder="Trip nameвҖҰ">
      <div class="date-group">
        <label>Start</label>
        <input id="start-date" class="topbar-input" type="date">
      </div>
      <div class="date-group">
        <label>End</label>
        <input id="end-date" class="topbar-input" type="date">
      </div>
      <button id="btn-trip-links">рҹ”— Trip Links</button>
    </div>

    <div id="trip-links-panel">
      <h3>Trip Links & Resources</h3>
      <div class="links-editor" id="trip-links-editor"></div>
      <button class="btn-add-link" id="btn-add-trip-link">+ Add link</button>
      <div class="links-chips" id="trip-links-chips"></div>
    </div>

    <div id="legend">
      <span class="hint" style="margin-left:0;margin-right:auto">Click any time slot to add an event</span>
    </div>

    <div id="no-dates-state" class="center-msg" style="display:none">
      <div class="icon">рҹ“…</div>
      <p>Enter start and end dates above to see your calendar</p>
    </div>
    <div id="cal-wrapper" style="display:none">
      <div id="cal"></div>
    </div>
  </div>
</div>

<!-- Event Modal -->
<div class="overlay" id="event-modal" style="display:none">
  <div class="modal">
    <h2 id="modal-heading">Add Event</h2>

    <!-- Type picker -->
    <div class="field">
      <label>Type</label>
      <div class="pills-wrap" id="type-pills"></div>
    </div>

    <!-- Icon picker -->
    <div class="field">
      <label>Icon</label>
      <div class="icon-picker">
        <div class="icon-current">
          <div class="icon-preview" id="icon-preview">рҹҚ”</div>
          <input class="icon-custom-input" id="icon-custom" type="text" maxlength="2" placeholder="вңҸпёҸ">
        </div>
        <div class="icon-grid" id="icon-grid"></div>
      </div>
    </div>

    <hr class="divider">

    <div class="field">
      <label>Title</label>
      <input type="text" id="ev-title" placeholder="e.g. Lunch at Joe's Diner">
    </div>
    <div class="two-col">
      <div class="field"><label>Start time</label><input type="time" id="ev-start"></div>
      <div class="field"><label>End time</label><input type="time" id="ev-end"></div>
    </div>
    <div class="field">
      <label>Location</label>
      <input type="text" id="ev-location" placeholder="e.g. 123 Main St, Nashville, TN">
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="ev-notes" placeholder="Details, remindersвҖҰ"></textarea>
    </div>
    <div class="field">
      <label>Links</label>
      <div class="modal-links" id="ev-links-list"></div>
      <button class="btn-add-link" id="btn-add-ev-link" style="margin-top:5px">+ Add link</button>
    </div>
    <div class="modal-actions">
      <button class="btn-delete" id="btn-delete-ev" style="display:none">Delete</button>
      <button class="btn-ghost" id="btn-cancel-ev">Cancel</button>
      <button class="btn-primary" id="btn-save-ev">Save</button>
    </div>
  </div>
</div>

// IndexedDB вҖ” persists the FileSystemFileHandle across sessions
function openIDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}
async function idbSaveHandle(h) {
  try { const idb = await openIDB(); idb.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).put(h, IDB_KEY); } catch {}
}
async function idbLoadHandle() {
  try {
    const idb = await openIDB();
    return await new Promise((res, rej) => {
      const req = idb.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(IDB_KEY);
      req.onsuccess = e => res(e.target.result);
      req.onerror   = e => rej(e.target.error);
    });
  } catch { return null; }
}
async function idbClearHandle() {
  try { const idb = await openIDB(); idb.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).delete(IDB_KEY); } catch {}
}

// File read / write
async function readFromHandle(h) {
  const text = await (await h.getFile()).text();
  return JSON.parse(text);
}
async function writeToHandle(h) {
  const w = await h.createWritable();
  await w.write(JSON.stringify(db, null, 2));
  await w.close();
}

// Main save вҖ” writes to localStorage always, file if linked
function dbSave() {
  lsSave();
  if (!fileLinked || !fileHandle) return;
  setFileStatus('unsaved');
  if (!pendingSave) {
    pendingSave = true;
    setTimeout(async () => {
      try { await writeToHandle(fileHandle); setFileStatus('saved'); }
      catch { setFileStatus('error'); }
      pendingSave = false;
    }, 400);
  }
}

// File status indicator
function setFileStatus(state) {
  const el = document.getElementById('file-status');
  el.onclick = null; el.style.cursor = '';
  const name = fileHandle ? fileHandle.name : '';
  if (state === 'none')    { el.className = '';        el.textContent = 'рҹ’ҫ No file linked'; }
  if (state === 'linked')  { el.className = 'linked';  el.textContent = `вң… ${name}`; }
  if (state === 'unsaved') { el.className = 'unsaved'; el.textContent = `в—Ҹ SavingвҖҰ`; }
  if (state === 'saved')   { el.className = 'linked';  el.textContent = `вң… ${name}`; }
  if (state === 'error')   { el.className = 'unsaved'; el.textContent = 'вҡ пёҸ Save failed вҖ” check permissions'; }
}

function applyLoadedData(data) {
  if (!data || typeof data.trips !== 'object') return false;
  db = data;
  if (!db.customTypes) db.customTypes = [];
  if (!db.trips[db.activeId]) db.activeId = Object.keys(db.trips)[0] || null;
  return true;
}

// Open existing .json file
async function openFile() {
  if (!window.showOpenFilePicker) { document.getElementById('file-unsupported').style.display='block'; return; }
  try {
    const [h] = await window.showOpenFilePicker({
      types: [{ description: 'Trip JSON', accept: { 'application/json': ['.json'] } }],
    });
    applyLoadedData(await readFromHandle(h));
    fileHandle = h; fileLinked = true;
    await idbSaveHandle(h);
    setFileStatus('linked'); lsSave(); renderSidebar(); renderTripEditor();
  } catch (e) { if (e.name !== 'AbortError') alert('Could not open file:\n' + e.message); }
}

// Save As вҖ” pick a new file location
async function saveFileAs() {
  if (!window.showSaveFilePicker) { document.getElementById('file-unsupported').style.display='block'; return; }
  try {
    const h = await window.showSaveFilePicker({
      suggestedName: 'trips.json',
      types: [{ description: 'Trip JSON', accept: { 'application/json': ['.json'] } }],
    });
    await writeToHandle(h);
    fileHandle = h; fileLinked = true;
    await idbSaveHandle(h);
    setFileStatus('linked');
  } catch (e) { if (e.name !== 'AbortError') alert('Could not save file:\n' + e.message); }
}

// On boot: try to restore a previously linked file handle from IndexedDB
async function tryRestoreHandle() {
  if (!window.showOpenFilePicker) {
    document.getElementById('file-unsupported').style.display = 'block'; return;
  }
  const h = await idbLoadHandle();
  if (!h) return;
  try {
    const perm = await h.queryPermission({ mode: 'readwrite' });
    if (perm === 'granted') {
      applyLoadedData(await readFromHandle(h));
      fileHandle = h; fileLinked = true;
      setFileStatus('linked'); lsSave(); renderSidebar(); renderTripEditor(); return;
    }
    // Needs user gesture to re-grant вҖ” show clickable prompt
    if (perm === 'prompt') {
      const el = document.getElementById('file-status');
      el.className = 'unsaved';
      el.textContent = `рҹ”— Click to reload ${h.name}`;
      el.style.cursor = 'pointer';
      el.onclick = async () => {
        el.onclick = null; el.style.cursor = '';
        try {
          if (await h.requestPermission({ mode: 'readwrite' }) === 'granted') {
            applyLoadedData(await readFromHandle(h));
            fileHandle = h; fileLinked = true;
            setFileStatus('linked'); lsSave(); renderSidebar(); renderTripEditor();
          }
        } catch {}
      };
    }
  } catch { await idbClearHandle(); }
}

function makeTrip(id) {
  return { id, name: '', start: '', end: '', links: [], events: {} };
}

let db = lsLoad();
if (!db || typeof db.trips !== 'object') {
  const id = uid();
  db = { activeId: id, trips: { [id]: makeTrip(id) }, customTypes: [] };
} else {
  if (!db.customTypes) db.customTypes = [];
}
if (!db.trips[db.activeId]) db.activeId = Object.keys(db.trips)[0] || null;

function activeTrip() { return db.trips[db.activeId] || null; }
function allTypes()   { return [...BUILT_IN, ...db.customTypes]; }
function getType(id)  { return allTypes().find(t => t.id === id) || BUILT_IN[0]; }

// в”Җв”Җ Helpers в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function uid() { return 't' + Date.now() + Math.random().toString(36).slice(2,6); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toMin(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function datesInRange(start, end) {
  const list = [], cur = new Date(start+'T00:00:00'), last = new Date(end+'T00:00:00');
  while (cur <= last) { list.push(fmtDate(cur)); cur.setDate(cur.getDate()+1); }
  return list;
}
function fmtDateLabel(iso) {
  return new Date(iso+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function tripDateLabel(t) {
  if (!t.start && !t.end) return 'No dates set';
  if (t.start && t.end) return `${fmtDateLabel(t.start)} вҖ“ ${fmtDateLabel(t.end)}`;
  return t.start ? `From ${fmtDateLabel(t.start)}` : `Until ${fmtDateLabel(t.end)}`;
}

// в”Җв”Җ Sidebar в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderSidebar() {
  const list = document.getElementById('trips-list');
  const trips = Object.values(db.trips).sort((a,b) => b.id > a.id ? 1 : -1);
  list.innerHTML = '';
  if (!trips.length) { list.innerHTML = '<div class="sidebar-empty">No trips yet</div>'; return; }
  trips.forEach(t => {
    const el = document.createElement('div');
    el.className = 'trip-item' + (t.id === db.activeId ? ' active' : '');
    el.innerHTML = `
      <div class="trip-item-name">${esc(t.name||'Untitled Trip')}</div>
      <div class="trip-item-dates">${tripDateLabel(t)}</div>
      <button class="trip-item-delete" title="Delete">вң•</button>
    `;
    el.addEventListener('click', e => {
      if (e.target.closest('.trip-item-delete')) return;
      db.activeId = t.id; dbSave(); renderSidebar(); renderTripEditor();
    });
    el.querySelector('.trip-item-delete').addEventListener('click', e => {
      e.stopPropagation();
      if (!confirm(`Delete "${t.name||'Untitled Trip'}"?`)) return;
      delete db.trips[t.id];
      if (db.activeId === t.id) {
        const rem = Object.keys(db.trips);
        if (!rem.length) { const nid = uid(); db.trips[nid] = makeTrip(nid); db.activeId = nid; }
        else db.activeId = rem[0];
      }
      dbSave(); renderSidebar(); renderTripEditor();
    });
    list.appendChild(el);
  });
}

// в”Җв”Җ Calendar в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderCalendar() {
  const t = activeTrip();
  const noDates = document.getElementById('no-dates-state');
  const wrapper = document.getElementById('cal-wrapper');
  const cal     = document.getElementById('cal');
  if (!t||!t.start||!t.end||t.start>t.end) { noDates.style.display='flex'; wrapper.style.display='none'; return; }
  noDates.style.display='none'; wrapper.style.display='block';
  const dates = datesInRange(t.start, t.end);
  cal.innerHTML = '';
  const gutter = document.createElement('div'); gutter.className = 'time-col';
  HOURS.forEach(h => {
    const tick = document.createElement('div'); tick.className = 'time-tick';
    tick.textContent = h===0?'12am':h<12?`${h}am`:h===12?'12pm':`${h-12}pm`;
    gutter.appendChild(tick);
  });
  cal.appendChild(gutter);
  dates.forEach(iso => {
    const d = new Date(iso+'T00:00:00');
    const col = document.createElement('div'); col.className = 'day-col';
    const head = document.createElement('div'); head.className = 'day-head';
    head.innerHTML = `<span class="dn">${d.getDate()}</span>${DAYS[d.getDay()]} ${MONTHS[d.getMonth()]}`;
    col.appendChild(head);
    HOURS.forEach(h => {
      const slot = document.createElement('div'); slot.className = 'hour-slot';
      slot.addEventListener('click', () => openEventModal(iso, h));
      col.appendChild(slot);
    });
    (t.events[iso]||[]).forEach(ev => placeEvent(col, ev, iso));
    cal.appendChild(col);
  });
}

function placeEvent(col, ev, iso) {
  const top    = 48 + (toMin(ev.start)/60)*60;
  const height = Math.max(((toMin(ev.end)-toMin(ev.start))/60)*60, 22);
  const type   = getType(ev.type);
  const icon   = ev.icon || type.icon;
  const el = document.createElement('div');
  el.className = 'ev';
  el.style.top = top+'px'; el.style.height = height+'px'; el.style.background = type.color;
  el.innerHTML = `<div class="et">${icon} ${esc(ev.title)}</div><div class="eT">${ev.start}вҖ“${ev.end}${ev.location?' В· '+esc(ev.location):''}</div>`;
  el.addEventListener('click', e => { e.stopPropagation(); openEventModal(iso, null, ev); });
  col.appendChild(el);
}

// в”Җв”Җ Type pills в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderTypePills() {
  const wrap = document.getElementById('type-pills');
  wrap.innerHTML = '';

  allTypes().forEach(t => {
    const pill = document.createElement('div');
    pill.className = 'pill' + (mType === t.id ? ' on' : '');
    pill.style.background = t.color; pill.style.borderColor = t.color;
    pill.dataset.t = t.id;
    pill.innerHTML = `${t.icon} ${esc(t.name)}`;

    // delete button only for custom types
    if (!BUILT_IN.find(b => b.id === t.id)) {
      const del = document.createElement('button');
      del.className = 'pill-del'; del.title = 'Delete type'; del.textContent = 'вң•';
      del.addEventListener('click', e => {
        e.stopPropagation();
        if (!confirm(`Delete type "${t.name}"? Events using it will keep their color.`)) return;
        db.customTypes = db.customTypes.filter(c => c.id !== t.id);
        if (mType === t.id) { mType = 'Food'; mIcon = 'рҹҚ”'; }
        dbSave(); renderTypePills(); renderLegend();
      });
      pill.appendChild(del);
    }

    pill.addEventListener('click', () => {
      mType = t.id; mIcon = t.icon; renderTypePills(); renderIconGrid();
    });
    wrap.appendChild(pill);
  });

  // + Create type button
  const btn = document.createElement('button');
  btn.className = 'btn-new-type'; btn.textContent = '+ New Type';
  btn.addEventListener('click', () => { showTypeForm = !showTypeForm; renderTypePills(); });
  wrap.appendChild(btn);

  // Inline create-type form
  if (showTypeForm) {
    tfColor = tfColor || PRESET_COLORS[5];
    tfIcon  = tfIcon  || 'вӯҗ';
    const form = document.createElement('div');
    form.className = 'type-form';
    form.style.width = '100%';
    form.innerHTML = `
      <h4>New Event Type</h4>
      <input type="text" id="tf-name" placeholder="Type nameвҖҰ" value="">
      <div>
        <div style="font-size:.75rem;color:var(--muted);margin-bottom:4px">Color</div>
        <div class="color-swatches" id="tf-swatches"></div>
      </div>
      <div>
        <div style="font-size:.75rem;color:var(--muted);margin-bottom:4px">Icon</div>
        <div class="icon-grid" id="tf-icon-grid"></div>
        <input type="text" id="tf-icon-custom" placeholder="or type any emoji" maxlength="2"
          style="margin-top:5px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:5px;font-size:.9rem;width:100%">
      </div>
      <div class="type-form-actions">
        <button class="btn-sm ghost" id="tf-cancel">Cancel</button>
        <button class="btn-sm primary" id="tf-save">Create</button>
      </div>
    `;
    wrap.appendChild(form);

    // Swatches
    const swatchWrap = form.querySelector('#tf-swatches');
    PRESET_COLORS.forEach(c => {
      const s = document.createElement('div');
      s.className = 'swatch' + (tfColor===c?' on':'');
      s.style.background = c;
      s.addEventListener('click', () => { tfColor = c; form.querySelectorAll('.swatch').forEach(x=>x.classList.remove('on')); s.classList.add('on'); });
      swatchWrap.appendChild(s);
    });

    // Icon grid for new type
    const tfGrid = form.querySelector('#tf-icon-grid');
    EMOJI_SET.forEach(em => {
      const cell = document.createElement('div');
      cell.className = 'icon-cell' + (tfIcon===em?' on':'');
      cell.textContent = em;
      cell.addEventListener('click', () => {
        tfIcon = em;
        form.querySelector('#tf-icon-custom').value = '';
        tfGrid.querySelectorAll('.icon-cell').forEach(x=>x.classList.remove('on'));
        cell.classList.add('on');
      });
      tfGrid.appendChild(cell);
    });

    form.querySelector('#tf-icon-custom').addEventListener('input', e => {
      const v = e.target.value.trim(); if (!v) return;
      tfIcon = v; tfGrid.querySelectorAll('.icon-cell').forEach(x=>x.classList.remove('on'));
    });
    form.querySelector('#tf-cancel').addEventListener('click', () => { showTypeForm=false; renderTypePills(); });
    form.querySelector('#tf-save').addEventListener('click', () => {
      const name = (form.querySelector('#tf-name').value||'').trim();
      if (!name) { form.querySelector('#tf-name').focus(); return; }
      const id = 'custom-' + uid();
      db.customTypes.push({ id, name, color: tfColor, icon: tfIcon });
      mType = id; mIcon = tfIcon;
      showTypeForm = false; dbSave(); renderTypePills(); renderLegend(); renderIconGrid();
    });
  }
}

// в”Җв”Җ Icon grid в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderIconGrid() {
  const preview = document.getElementById('icon-preview');
  const custom  = document.getElementById('icon-custom');
  const grid    = document.getElementById('icon-grid');
  preview.textContent = mIcon;
  custom.value = '';
  grid.innerHTML = '';
  EMOJI_SET.forEach(em => {
    const cell = document.createElement('div');
    cell.className = 'icon-cell' + (mIcon===em?' on':'');
    cell.textContent = em;
    cell.addEventListener('click', () => {
      mIcon = em; custom.value = '';
      grid.querySelectorAll('.icon-cell').forEach(x=>x.classList.remove('on'));
      cell.classList.add('on');
      preview.textContent = mIcon;
    });
    grid.appendChild(cell);
  });
}

document.getElementById('icon-custom').addEventListener('input', e => {
  const v = e.target.value.trim(); if (!v) return;
  mIcon = v;
  document.getElementById('icon-preview').textContent = mIcon;
  document.getElementById('icon-grid').querySelectorAll('.icon-cell').forEach(x=>x.classList.remove('on'));
});

// в”Җв”Җ Event links в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderEvLinks() {
  const list = document.getElementById('ev-links-list'); list.innerHTML = '';
  mLinks.forEach((lk,i) => {
    const row = document.createElement('div'); row.className = 'link-row';
    row.innerHTML = `
      <input type="text" placeholder="Label" value="${esc(lk.label)}" data-i="${i}" data-f="label">
      <input type="url"  placeholder="https://вҖҰ" value="${esc(lk.url)}" data-i="${i}" data-f="url">
      <button class="btn-rm-link" data-i="${i}">вң•</button>`;
    row.querySelectorAll('input').forEach(inp => inp.addEventListener('input', ev => {
      mLinks[+ev.target.dataset.i][ev.target.dataset.f] = ev.target.value;
    }));
    row.querySelector('button').addEventListener('click', ev => { mLinks.splice(+ev.target.dataset.i,1); renderEvLinks(); });
    list.appendChild(row);
  });
}
document.getElementById('btn-add-ev-link').addEventListener('click', () => { mLinks.push({label:'',url:''}); renderEvLinks(); });

// в”Җв”Җ Modal save / delete / close в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function closeModal() { document.getElementById('event-modal').style.display='none'; }
document.getElementById('btn-cancel-ev').addEventListener('click', closeModal);
document.getElementById('event-modal').addEventListener('click', e => { if (e.target.id==='event-modal') closeModal(); });

document.getElementById('btn-save-ev').addEventListener('click', () => {
  const title = document.getElementById('ev-title').value.trim();
  if (!title) { document.getElementById('ev-title').focus(); return; }
  const start = document.getElementById('ev-start').value;
  const end   = document.getElementById('ev-end').value;
  if (!start||!end) return;
  const t = activeTrip(); if (!t) return;
  if (!t.events[mDate]) t.events[mDate] = [];
  const ev = {
    id: mId||uid(), type: mType, icon: mIcon, title, start, end,
    location: document.getElementById('ev-location').value.trim(),
    notes:    document.getElementById('ev-notes').value,
    links:    mLinks.filter(l=>l.url),
  };
  if (mMode==='new') {
    t.events[mDate].push(ev);
  } else {
    const idx = t.events[mDate].findIndex(e=>e.id===mId);
    if (idx!==-1) t.events[mDate][idx] = ev;
  }
  dbSave(); closeModal(); renderCalendar();
});

document.getElementById('btn-delete-ev').addEventListener('click', () => {
  if (!confirm('Delete this event?')) return;
  const t = activeTrip(); if (!t) return;
  t.events[mDate] = (t.events[mDate]||[]).filter(e=>e.id!==mId);
  dbSave(); closeModal(); renderCalendar();
});

// в”Җв”Җ File buttons в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
document.getElementById('btn-open-file').addEventListener('click', openFile);
document.getElementById('btn-save-file').addEventListener('click', saveFileAs);

// в”Җв”Җ Boot в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
renderSidebar();
renderTripEditor();
tryRestoreHandle(); // async вҖ” updates UI if a file was previously linked
</script>
