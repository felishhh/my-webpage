<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Road Trip Planner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8fafc; --surface: #ffffff; --surface2: #f1f5f9;
      --border: #e2e8f0; --text: #0f172a; --muted: #64748b; --accent: #0284c7;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Sidebar ── */
    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: 260px;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; z-index: 10;
    }
    #sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
    #sidebar-header h1 { font-size: 1.1rem; color: var(--accent); margin-bottom: 12px; }
    #btn-new-trip {
      width: 100%; background: var(--accent); color: #fff; border: none;
      padding: 8px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: .88rem;
    }
    #btn-new-trip:hover { opacity: .88; }
    #trips-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
    .trip-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; position: relative; }
    .trip-item:hover { background: var(--surface2); }
    .trip-item.active { background: #e0f2fe; border-color: #7dd3fc; }
    .trip-item-name { font-size: .88rem; font-weight: 600; }
    .trip-item-dates { font-size: .72rem; color: var(--muted); margin-top: 2px; }
    .trip-item-delete {
      position: absolute; top: 8px; right: 8px; background: none; border: none;
      color: var(--muted); cursor: pointer; font-size: .8rem; opacity: 0; padding: 2px 5px; border-radius: 4px;
    }
    .trip-item:hover .trip-item-delete { opacity: 1; }
    .trip-item-delete:hover { color: #ef4444; background: rgba(239,68,68,.1); }
    .sidebar-empty { color: var(--muted); font-size: .82rem; text-align: center; padding: 20px 0; }

    /* ── File bar ── */
    #file-bar { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
    #file-status { font-size: .72rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #file-status.linked { color: #16a34a; font-weight: 600; }
    #file-status.unsaved { color: #d97706; }
    .file-btns { display: flex; gap: 5px; }
    .btn-file { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 5px 0; border-radius: 5px; cursor: pointer; font-size: .75rem; text-align: center; }
    .btn-file:hover { border-color: var(--accent); color: var(--accent); }
    #file-unsupported { font-size: .7rem; color: #dc2626; padding: 4px 0; display: none; }

    /* ── Main ── */
    #main { margin-left: 260px; display: flex; flex-direction: column; min-height: 100vh; }

    /* ── Top bar ── */
    #topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; gap: 12px; }
    .topbar-input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: .88rem; }
    #trip-name-input { width: 180px; font-weight: 600; }
    input[type="date"].topbar-input { color-scheme: light; }
    .date-range { display: flex; align-items: center; gap: 5px; }
    .date-sep { color: var(--muted); font-size: .82rem; }
    .tb-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }
    .tb-divider { width: 1px; height: 18px; background: var(--border); margin: 0 2px; }
    .tb-icon-btn { background: none; border: 1px solid transparent; color: var(--muted); cursor: pointer; padding: 5px 8px; border-radius: 6px; font-size: .95rem; display: flex; align-items: center; justify-content: center; line-height: 1; }
    .tb-icon-btn:hover { background: var(--surface2); border-color: var(--border); color: var(--text); }

    /* ── Trip links panel ── */
    #trip-links-panel { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: none; flex-direction: column; gap: 10px; }
    #trip-links-panel.open { display: flex; }
    #trip-links-panel h3 { font-size: .85rem; color: var(--muted); }
    .links-editor { display: flex; flex-direction: column; gap: 6px; }
    .link-row { display: flex; gap: 6px; }
    .link-row input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 9px; border-radius: 5px; font-size: .85rem; flex: 1; }
    .link-row input:first-child { max-width: 140px; }
    .btn-rm-link { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 5px; cursor: pointer; padding: 4px 8px; font-size: .8rem; }
    .btn-rm-link:hover { color: #ef4444; border-color: #ef4444; }
    .btn-add-link { background: none; border: 1px dashed var(--border); color: var(--muted); border-radius: 6px; padding: 6px; cursor: pointer; font-size: .8rem; text-align: center; }
    .btn-add-link:hover { border-color: var(--accent); color: var(--accent); }
    .links-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .links-chips a { color: var(--accent); font-size: .8rem; text-decoration: none; background: #e0f2fe; padding: 2px 10px; border-radius: 4px; border: 1px solid #7dd3fc; }
    .links-chips a:hover { text-decoration: underline; }

    /* ── Legend ── */
    #legend { display: flex; gap: 10px; padding: 5px 20px; flex-wrap: wrap; background: var(--bg); border-bottom: 1px solid var(--border); align-items: center; }
    .leg { display: flex; align-items: center; gap: 4px; font-size: .72rem; color: var(--muted); }
    .leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    #btn-manage-types { margin-left: auto; background: none; border: none; color: var(--muted); padding: 3px 6px; border-radius: 5px; cursor: pointer; font-size: .85rem; opacity: .6; }
    #btn-manage-types:hover { opacity: 1; background: var(--surface2); }
    /* ── View toggle (lives in topbar) ── */
    .view-toggle { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; flex-shrink: 0; }
    .view-btn { background: none; border: none; border-right: 1px solid var(--border); color: var(--muted); padding: 5px 14px; cursor: pointer; font-size: .78rem; font-weight: 500; }
    .view-btn:last-child { border-right: none; }
    .view-btn.active { background: var(--accent); color: #fff; }
    .view-btn:not(.active):hover { background: var(--surface2); color: var(--text); }

    /* ── Itinerary view ── */
    #itinerary-view { padding: 20px; overflow-x: auto; }
    .itin-table { width: 100%; border-collapse: collapse; font-size: .84rem; }
    .itin-table th { background: var(--surface); border-bottom: 2px solid var(--border); padding: 9px 12px; text-align: left; font-size: .73rem; color: var(--muted); font-weight: 700; letter-spacing: .03em; white-space: nowrap; }
    .itin-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .itin-table tbody tr:hover td { background: var(--surface2); cursor: pointer; }
    .itin-day-head td { background: var(--surface2); font-size: .75rem; font-weight: 700; color: var(--muted); letter-spacing: .04em; padding: 5px 12px; border-top: 2px solid var(--border); border-bottom: 1px solid var(--border); }
    .itin-type-chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 10px; font-size: .72rem; font-weight: 600; color: #fff; white-space: nowrap; }
    .itin-addon { font-size: .68rem; color: var(--muted); margin-top: 2px; }
    .itin-notes-cell { color: var(--muted); font-size: .78rem; max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .itin-export-btn:hover { opacity: .88; }
    .itin-opts-badge { display: inline-flex; align-items: center; gap: 4px; font-size: .73rem; font-weight: 600; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
    .itin-opts-pending { background: #fef3c7; color: #92400e; }
    .itin-opts-sel { background: #dcfce7; color: #166534; }
    .itin-editable { cursor: text; }
    td.itin-editable:hover { background: #f0f9ff; }
    .itin-edit-cell { width: 32px; text-align: center; }
    .itin-edit-btn { background: none; border: none; cursor: pointer; font-size: .9rem; opacity: 0; padding: 2px 4px; border-radius: 4px; transition: opacity .15s; }
    .itin-table tbody tr:hover .itin-edit-btn { opacity: 1; }
    .itin-edit-btn:hover { background: var(--surface2); }

    /* ── Types panel ── */
    #types-panel { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: none; flex-direction: column; gap: 12px; }
    #types-panel.open { display: flex; }
    #types-panel h3 { font-size: .85rem; color: var(--muted); }
    .type-row { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); }
    .type-row-icon { font-size: 1.1rem; width: 26px; text-align: center; flex-shrink: 0; }
    .type-row-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .type-row-name { font-size: .85rem; font-weight: 600; flex: 1; }
    .type-row-tag { font-size: .68rem; color: var(--muted); background: var(--bg); border: 1px solid var(--border); padding: 1px 7px; border-radius: 10px; }
    .btn-type-edit { background: none; border: 1px solid var(--border); color: var(--muted); padding: 3px 10px; border-radius: 5px; cursor: pointer; font-size: .75rem; }
    .btn-type-edit:hover { border-color: var(--accent); color: var(--accent); }
    .btn-type-del { background: none; border: 1px solid var(--border); color: var(--muted); padding: 3px 8px; border-radius: 5px; cursor: pointer; font-size: .75rem; }
    .btn-type-del:hover { border-color: #ef4444; color: #ef4444; }

    /* ── Packing modal overlay ── */
    #packing-modal { position: fixed; top: 0; left: 260px; right: 0; bottom: 0; background: var(--bg); z-index: 30; display: none; flex-direction: column; overflow-y: auto; }
    #packing-modal.open { display: flex; }
    .pack-modal-inner { width: 100%; padding: 24px 28px; display: flex; flex-direction: column; gap: 16px; }
    .pack-modal-head { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .pack-modal-head h2 { font-size: 1.1rem; color: var(--accent); }
    #btn-close-packing { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: .82rem; }
    #btn-close-packing:hover { border-color: var(--accent); color: var(--accent); }
    .pack-summary { font-size: .78rem; color: var(--muted); }
    .pack-summary strong { color: #15803d; }
    .pack-cats { display: flex; flex-direction: column; gap: 10px; }
    .pack-cat { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .pack-cat-head { display: flex; align-items: center; gap: 8px; padding: 9px 12px; background: var(--surface2); position: relative; }
    .pack-cat-emoji { font-size: 1.1rem; cursor: pointer; padding: 2px 5px; border-radius: 5px; border: 1px solid transparent; user-select: none; }
    .pack-cat-emoji:hover { border-color: var(--border); background: var(--surface); }
    .pack-emoji-picker { position: absolute; top: 38px; left: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px; display: flex; flex-wrap: wrap; gap: 4px; width: 220px; z-index: 20; box-shadow: 0 4px 12px rgba(0,0,0,.12); }
    .pack-emoji-opt { width: 28px; height: 28px; font-size: .95rem; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 4px; }
    .pack-emoji-opt:hover { background: #e0f2fe; }
    .pack-cat-name { font-size: .88rem; font-weight: 600; flex: 1; background: none; border: 1px solid transparent; color: var(--text); padding: 3px 6px; border-radius: 4px; min-width: 0; }
    .pack-cat-name:focus { background: var(--surface); border-color: var(--accent); outline: none; }
    .pack-progress-badge { font-size: .72rem; color: var(--muted); white-space: nowrap; padding: 2px 8px; border-radius: 10px; background: var(--bg); border: 1px solid var(--border); }
    .pack-progress-badge.done { color: #15803d; border-color: #86efac; background: #dcfce7; font-weight: 700; }
    .btn-pack-del-cat { background: none; border: none; color: var(--muted); cursor: pointer; font-size: .85rem; padding: 2px 5px; border-radius: 4px; }
    .btn-pack-del-cat:hover { color: #ef4444; }
    .pack-progress-bar { height: 3px; background: var(--border); }
    .pack-progress-fill { height: 100%; background: #22c55e; transition: width .25s; border-radius: 0 2px 2px 0; }
    .pack-items { padding: 8px 12px; display: flex; flex-direction: column; gap: 5px; }
    .pack-item { display: flex; align-items: center; gap: 8px; padding: 2px 0; }
    .pack-item input[type="checkbox"] { width: 15px; height: 15px; accent-color: #22c55e; cursor: pointer; flex-shrink: 0; }
    .pack-item-name { font-size: .85rem; flex: 1; color: var(--text); }
    .pack-item-name.checked { text-decoration: line-through; color: var(--muted); }
    .btn-pack-del-item { background: none; border: none; color: transparent; cursor: pointer; font-size: .78rem; padding: 2px 4px; }
    .pack-item:hover .btn-pack-del-item { color: var(--muted); }
    .btn-pack-del-item:hover { color: #ef4444 !important; }
    .pack-add-item { display: flex; gap: 6px; padding: 8px 12px 10px; border-top: 1px solid var(--border); margin-top: 2px; align-items: center; }
    .pack-add-in { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 5px 9px; border-radius: 5px; font-size: .84rem; flex: 1; resize: none; overflow: hidden; font-family: inherit; line-height: 1.4; }
    .pack-add-in:focus { outline: none; border-color: var(--accent); }
    .pack-add-item button { background: var(--accent); color: #fff; border: none; padding: 5px 13px; border-radius: 5px; cursor: pointer; font-size: .82rem; font-weight: 600; }
    .pack-add-item button:hover { opacity: .88; }
    .btn-pack-add-cat { background: none; border: 1px dashed var(--border); color: var(--muted); border-radius: 8px; padding: 9px; cursor: pointer; font-size: .82rem; text-align: center; flex-shrink: 0; }
    .btn-pack-add-cat:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Empty states ── */
    .center-msg { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--muted); padding: 40px; }
    .center-msg .icon { font-size: 3rem; }
    .center-msg p { font-size: .95rem; }

    /* ── Calendar ── */
    #cal-wrapper { overflow-x: auto; padding: 20px; flex: 1; }
    #cal { display: flex; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; min-width: max-content; }
    .time-col { width: 54px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); padding-top: 48px; }
    .time-tick { height: 60px; display: flex; align-items: flex-start; justify-content: flex-end; padding: 4px 7px 0 0; font-size: .68rem; color: var(--muted); }
    .day-col { flex: 1; min-width: 170px; border-right: 1px solid var(--border); background: var(--bg); position: relative; }
    .day-col:last-child { border-right: none; }
    .day-head { height: 48px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: .82rem; position: sticky; top: 0; z-index: 2; }
    .day-head .dn { font-size: 1.25rem; color: var(--accent); margin-right: 5px; }
    .hour-slot { height: 60px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
    .hour-slot:hover { background: #f0f9ff; }
    .hour-slot:last-child { border-bottom: none; }
    .ev {
      position: absolute; left: 3px; right: 3px; border-radius: 5px;
      padding: 3px 6px; font-size: .7rem; font-weight: 600; color: #fff;
      cursor: pointer; overflow: hidden; z-index: 1; opacity: .93;
      transition: opacity .12s, transform .12s; display: flex; flex-direction: column; gap: 1px;
    }
    .ev:hover { opacity: 1; transform: scaleX(1.015); }
    .ev.addon { opacity: .7; border: 2px dashed rgba(255,255,255,.7); background-clip: padding-box; }
    .ev .et { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ev .eT { font-weight: 400; opacity: .85; font-size: .63rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ev .e-opts { font-size: .6rem; opacity: .8; font-weight: 400; margin-top: 1px; }
    /* ── Drag & resize ── */
    .ev { cursor: grab; user-select: none; }
    .ev.ev-dragging { opacity: .3; }
    .ev-ghost { position: fixed; pointer-events: none; z-index: 200; border-radius: 5px; padding: 3px 6px; font-size: .7rem; font-weight: 600; color: #fff; display: flex; flex-direction: column; gap: 1px; box-shadow: 0 6px 20px rgba(0,0,0,.25); overflow: hidden; }
    .ev-resize-handle { position: absolute; bottom: 0; left: 0; right: 0; height: 8px; cursor: ns-resize; border-radius: 0 0 5px 5px; opacity: 0; background: rgba(255,255,255,.35); }
    .ev:hover .ev-resize-handle { opacity: 1; }
    .day-col.drag-over { background: #e0f9ff; }

    /* ── Modal ── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 100%; max-width: 520px; max-height: 92vh; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
    .modal h2 { font-size: 1.05rem; color: var(--accent); }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: .77rem; color: var(--muted); font-weight: 500; }
    .field input, .field textarea { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: 6px; font-size: .88rem; width: 100%; color-scheme: light; }
    .field textarea { resize: vertical; min-height: 55px; font-family: inherit; }
    .two-col { display: flex; gap: 10px; }
    .two-col .field { flex: 1; }
    hr.divider { border: none; border-top: 1px solid var(--border); margin: 0; }

    /* ── Type pills (selection only in modal) ── */
    .pills-wrap { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .pill { padding: 5px 12px; border-radius: 20px; border: 2px solid transparent; cursor: pointer; font-size: .8rem; font-weight: 600; opacity: .4; transition: opacity .14s; display: flex; align-items: center; gap: 4px; color: #fff; }
    .pill.on { opacity: 1; }

    /* ── Type inline form (create or edit) ── */
    .type-form { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 2px; }
    .type-form h4 { font-size: .82rem; color: var(--muted); font-weight: 600; }
    .type-form input[type="text"] { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: 6px; font-size: .88rem; width: 100%; }
    .color-swatches { display: flex; gap: 6px; flex-wrap: wrap; }
    .swatch { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform .1s; flex-shrink: 0; }
    .swatch.on { border-color: var(--text); transform: scale(1.2); }
    .icon-grid { display: flex; flex-wrap: wrap; gap: 4px; }
    .icon-cell { width: 30px; height: 30px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: .95rem; display: flex; align-items: center; justify-content: center; transition: background .1s; }
    .icon-cell:hover { background: #e0f2fe; }
    .icon-cell.on { background: #bae6fd; border-color: var(--accent); }
    .type-form-actions { display: flex; gap: 6px; justify-content: flex-end; }

    /* ── Options / alternatives ── */
    .options-list { display: flex; flex-direction: column; gap: 8px; }
    .option-card { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .option-card-head { display: flex; align-items: center; gap: 6px; padding: 8px 10px; background: var(--surface2); border-bottom: 1px solid var(--border); }
    .option-status-badge { font-size: .7rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; flex-shrink: 0; }
    .option-status-badge.selected { background: #dcfce7; color: #15803d; }
    .option-status-badge.considering { background: #f1f5f9; color: var(--muted); }
    .btn-select-opt { font-size: .72rem; padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); background: none; color: var(--muted); cursor: pointer; margin-left: auto; }
    .btn-select-opt:hover { border-color: #15803d; color: #15803d; }
    .btn-select-opt.is-selected { background: #dcfce7; border-color: #86efac; color: #15803d; cursor: default; }
    .btn-rm-opt { background: none; border: none; color: var(--muted); cursor: pointer; font-size: .85rem; padding: 2px 4px; border-radius: 4px; }
    .btn-rm-opt:hover { color: #ef4444; }
    .option-card-body { padding: 10px; display: flex; flex-direction: column; gap: 7px; }
    .option-card-body input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 9px; border-radius: 5px; font-size: .84rem; width: 100%; }
    .option-card-body textarea { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 9px; border-radius: 5px; font-size: .84rem; width: 100%; resize: vertical; min-height: 48px; font-family: inherit; }
    .option-links { display: flex; flex-direction: column; gap: 5px; }

    /* ── Add-on toggle ── */
    .addon-toggle { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 7px; border: 1px solid var(--border); cursor: pointer; background: var(--surface2); }
    .addon-toggle input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--accent); }
    .addon-toggle span { font-size: .82rem; color: var(--muted); }
    .addon-toggle:has(input:checked) { border-color: var(--accent); background: #e0f2fe; }
    .addon-toggle:has(input:checked) span { color: var(--accent); font-weight: 600; }

    /* ── Shared small buttons ── */
    .btn-sm { padding: 5px 12px; border-radius: 5px; font-size: .8rem; cursor: pointer; font-weight: 600; }
    .btn-sm.primary { background: var(--accent); color: #fff; border: none; }
    .btn-sm.primary:hover { opacity: .88; }
    .btn-sm.ghost { background: none; border: 1px solid var(--border); color: var(--muted); }
    .btn-sm.ghost:hover { color: var(--text); }

    /* ── Modal actions ── */
    .modal-links { display: flex; flex-direction: column; gap: 5px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
    .btn-primary { background: var(--accent); color: #fff; border: none; padding: 8px 20px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: .88rem; }
    .btn-primary:hover { opacity: .88; }
    .btn-ghost { background: none; border: 1px solid var(--border); color: var(--muted); padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: .88rem; }
    .btn-ghost:hover { border-color: var(--text); color: var(--text); }
    .btn-delete { background: none; border: 1px solid #ef4444; color: #ef4444; padding: 8px 13px; border-radius: 6px; cursor: pointer; font-size: .88rem; margin-right: auto; }
    .btn-delete:hover { background: rgba(239,68,68,.1); }
  </style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <h1>🚗 Road Trip Planner</h1>
    <button id="btn-new-trip">+ New Trip</button>
  </div>
  <div id="file-bar">
    <div id="file-status">💾 No file linked</div>
    <div class="file-btns">
      <button class="btn-file" id="btn-open-file">📂 Open</button>
      <button class="btn-file" id="btn-save-file">💾 Save As</button>
    </div>
    <div id="file-unsupported">⚠️ Use Chrome or Edge for file support</div>
  </div>
  <div id="trips-list"></div>
</div>

<!-- Main -->
<div id="main">
  <div id="no-trip-state" class="center-msg" style="display:none">
    <div class="icon">🗺️</div>
    <p>Select a trip or create a new one</p>
  </div>
  <div id="trip-editor" style="display:none">
    <div id="topbar">
      <input id="trip-name-input" class="topbar-input" type="text" placeholder="Trip name…">
      <div class="date-range">
        <input id="start-date" class="topbar-input" type="date">
        <span class="date-sep">→</span>
        <input id="end-date" class="topbar-input" type="date">
      </div>
      <div class="tb-right">
        <div class="view-toggle">
          <button class="view-btn active" data-view="cal">Calendar</button>
          <button class="view-btn" data-view="itin">Itinerary</button>
        </div>
        <div class="tb-divider"></div>
        <button id="btn-export-excel" class="tb-icon-btn" title="Export to Excel" style="display:none"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v13M7 11l5 5 5-5"/><path d="M5 20h14"/></svg></button>
        <button id="btn-packing-list" class="tb-icon-btn" title="Packing List">🧳</button>
        <button id="btn-trip-links" class="tb-icon-btn" title="Trip Links">🔗</button>
      </div>
    </div>
    <div id="trip-links-panel">
      <h3>Trip Links & Resources</h3>
      <div class="links-editor" id="trip-links-editor"></div>
      <button class="btn-add-link" id="btn-add-trip-link">+ Add link</button>
      <div class="links-chips" id="trip-links-chips"></div>
    </div>
    <div id="types-panel">
      <h3>Event Types</h3>
      <div id="types-list"></div>
      <button class="btn-add-link" id="btn-add-type-row">+ New Type</button>
      <div id="types-create-form"></div>
    </div>
    <div id="legend"></div>
    <div id="no-dates-state" class="center-msg" style="display:none">
      <div class="icon">📅</div>
      <p>Enter start and end dates above to see your calendar</p>
    </div>
    <div id="cal-wrapper" style="display:none"><div id="cal"></div></div>
    <div id="itinerary-view" style="display:none"></div>
  </div>
</div>

<!-- Event Modal -->
<div class="overlay" id="event-modal" style="display:none">
  <div class="modal">
    <h2 id="modal-heading">Add Event</h2>

    <!-- Type -->
    <div class="field">
      <label>Type</label>
      <div class="pills-wrap" id="type-pills"></div>
    </div>

    <hr class="divider">

    <!-- Core fields -->
    <div class="field" id="ev-date-field"><label>Date</label><input type="date" id="ev-date" class="topbar-input" style="width:100%"></div>
    <div class="field"><label>Title</label><input type="text" id="ev-title" placeholder="e.g. Afternoon Hike"></div>
    <div class="two-col">
      <div class="field"><label>Start time</label><input type="time" id="ev-start"></div>
      <div class="field"><label>End time</label><input type="time" id="ev-end"></div>
    </div>
    <div class="field"><label>Location</label><input type="text" id="ev-location" placeholder="e.g. 123 Main St, Nashville, TN"></div>
    <div class="field"><label>Notes</label><textarea id="ev-notes" placeholder="Details, reminders…"></textarea></div>
    <div class="field">
      <label>Links</label>
      <div class="modal-links" id="ev-links-list"></div>
      <button class="btn-add-link" id="btn-add-ev-link" style="margin-top:5px">+ Add link</button>
    </div>

    <hr class="divider">

    <!-- Options / alternatives -->
    <div class="field">
      <label>Options / Alternatives <span style="font-weight:400;color:var(--muted)">(e.g. 3 potential hikes)</span></label>
      <div class="options-list" id="ev-options-list"></div>
      <button class="btn-add-link" id="btn-add-option" style="margin-top:6px">+ Add option</button>
    </div>

    <!-- Add-on toggle -->
    <label class="addon-toggle">
      <input type="checkbox" id="ev-is-addon">
      <span>⊕ Mark as optional / add-on activity</span>
    </label>

    <div class="modal-actions">
      <button class="btn-delete" id="btn-delete-ev" style="display:none">Delete</button>
      <button class="btn-ghost" id="btn-cancel-ev">Cancel</button>
      <button class="btn-primary" id="btn-save-ev">Save</button>
